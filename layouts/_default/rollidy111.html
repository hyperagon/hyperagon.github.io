<script>
/* -------------------------------------------------
   CHUNKED PLAYBACK CONFIGURATION
   ------------------------------------------------- */
const CHUNK_BEATS = 64;
const SCHEDULE_AHEAD_TIME = 0.2; // Seconds to look ahead for next chunk

// Playback State
let currentChunkIndex = -1;
let currentChunkSource = null;
let nextChunkBuffer = null;
let isPreparingNextChunk = false;
let chunkStartTime = 0; // AudioContext time when current chunk started

// ADD THESE TWO LINES:
let masterGain = null;
let currentVolume = 0.5; // 50%
let playbackTrueEnd = 0;

const PITCHES = [];
for (let oct = 1; oct <= 7; oct++) {
  const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  notes.forEach(n => PITCHES.push(n + oct));
}
PITCHES.reverse();

const SUBDIV = 4;
let BEATS = 64; 
let STEPS = BEATS * SUBDIV;

const CELL_W = 40;
const CELL_H = 20;

let TEMPO = 120; 
let stepSec = (60 / TEMPO) / SUBDIV;
let isPlaying = false;
let playRequestId = 0;

/* -------------------------------------------------
   VIRTUAL CANVAS & RESIZING
   ------------------------------------------------- */

const gridSpacer = document.getElementById('gridSpacer');
const verticalSpacer = document.getElementById('verticalSpacer');

function resizeCanvas() {
  // 1. Canvas size matches the VIEWPORT (Window), never the song length.
  // This is the key to reliability - the canvas is just a lens.
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  
  // 2. Redraw the visible portion immediately after resize
  redrawAll();
}

function updateSongLength() {
  // 1. Calculate required width based on data
  // We add a buffer so the user can scroll past the last note to compose
  const bufferBeats = 100;
  const minSteps = (BEATS + bufferBeats) * SUBDIV;
  
  // Use the actual length of the notes array to determine current size
  const steps = Math.max(notes.length, minSteps);
  const totalWidth = steps * CELL_W;
  
  // 2. Update Horizontal Spacer (Triggers Scrollbar)
  gridSpacer.style.width = totalWidth + 'px';
  
  // 3. Update Vertical Spacer (For vertical scrolling)
  // Forces the height to accommodate all pitches
  const totalHeight = PITCHES.length * CELL_H;
  verticalSpacer.style.height = totalHeight + 'px';
  
  // 4. Ensure the Data Array matches this new length
  // This expands the array but never shrinks it (data safety)
  expandGridToSteps(steps);
}

function expandGridToSteps(newTotalSteps) {
  const oldSteps = notes.length;

  // Only expand if needed
  if (newTotalSteps > oldSteps) {
    // Update Global Counters
    BEATS = Math.ceil(newTotalSteps / SUBDIV);
    STEPS = BEATS * SUBDIV;

    // Push new empty rows into the data array
    for (let i = oldSteps; i < STEPS; i++) {
      notes.push(new Uint8Array(PITCHES.length));
    }
    
    // IMPORTANT: Update scroll spacer immediately to reflect new size
    gridSpacer.style.width = (STEPS * CELL_W) + 'px';
  }
}

// Global Resize Listener
window.addEventListener('resize', resizeCanvas);

/* -------------------------------------------------
   DYNAMIC GRID RESIZING
   ------------------------------------------------- */
   
function expandGridToSteps(newTotalSteps) {
  const oldSteps = notes.length; // Use actual array length for safety

  // Only expand if needed
  if (newTotalSteps > oldSteps) {
    BEATS = Math.ceil(newTotalSteps / SUBDIV);
    STEPS = BEATS * SUBDIV;

    for (let i = oldSteps; i < STEPS; i++) {
      notes.push(new Uint8Array(PITCHES.length));
    }
  }
}

/* -------------------------------------------------
   UNDO / REDO STACKS
   ------------------------------------------------- */
const undoStack = [];   
const redoStack = [];   
const MAX_STACK = 50;   

function cloneNotes() {
  return notes.map(row => new Uint8Array(row));
}

function pushUndo() {
  if (undoStack.length >= MAX_STACK) undoStack.shift();
  undoStack.push(cloneNotes());
  redoStack.length = 0;
}

/* -------------------------------------------------
   CLIPBOARD
   ------------------------------------------------- */
let clipboard = []; 

/* -------------------------------------------------
   BPM CHANGE HANDLER
   ------------------------------------------------- */
const bpmInput = document.getElementById('bpmInput');

function updateTempo(newTempo) {
  const val = parseInt(newTempo);
  if (isNaN(val) || val < 20) TEMPO = 20;
  else if (val > 300) TEMPO = 300;
  else TEMPO = val;
  stepSec = (60 / TEMPO) / SUBDIV;
  if (isPlaying) stopPlayback(); 
}

bpmInput.addEventListener('input', (e) => {
  const val = parseInt(e.target.value);
  if (!isNaN(val)) updateTempo(val);
});

bpmInput.addEventListener('blur', (e) => {
  e.target.value = TEMPO;
});

/* -------------------------------------------------
   DATA MODEL (Main App)
   ------------------------------------------------- */
const notes = Array.from({ length: STEPS }, () =>
  new Uint8Array(PITCHES.length)
);

// Helper to create the default Instrument State
function createDefaultInstrumentState() {
  const defaultStyle = getStyle('square');
  const state = {
    waveType: defaultStyle.value
  };
  const styleDefaults = defaultStyle.createDefaultState();
  for (let key in styleDefaults) {
    state[key] = styleDefaults[key];
  }
  return state;
}

const instrumentSettings = [
  createDefaultInstrumentState(),
  createDefaultInstrumentState(),
  createDefaultInstrumentState(),
  createDefaultInstrumentState()
];

let currentInstrument = 0;

/* -------------------------------------------------
   CANVAS & DOM SETUP
   ------------------------------------------------- */
const canvas = document.getElementById('rollCanvas');
const ctx = canvas.getContext('2d');
canvas.width = STEPS * CELL_W;
// Add padding to height so scrollbar sits under the last row
canvas.height = PITCHES.length * CELL_H;

const labelsCol = document.getElementById('labelsCol');
const container = document.getElementById('canvasScroller'); 

PITCHES.forEach((p, idx) => {
  const div = document.createElement('div');
  div.className = 'label-row';
  div.innerText = p;
  
  // Play on press, stop on release/leave
  div.addEventListener('mousedown', (e) => {
    e.preventDefault(); 
    playNoteFromLabel(idx);
  });
  div.addEventListener('mouseup', () => stopNoteFromLabel());
  div.addEventListener('mouseleave', () => stopNoteFromLabel());
  
  labelsCol.appendChild(div);
});

// --- SCROLL SYNCHRONIZATION (Updated) ---

// 1. Main Grid Scroll -> Updates Labels
// We keep 'passive: false' because we might need to control scroll behavior
container.addEventListener('scroll', () => {
  labelsCol.scrollTop = container.scrollTop;
  redrawAll(); // Redraw on scroll to update virtual canvas
}, { passive: true });

// 2. Labels Scroll -> Updates Main Grid (New)
// Syncs the vertical scroll when dragging the left sidebar
labelsCol.addEventListener('scroll', () => {
  // Prevent infinite loops: only update if they differ
  if (container.scrollTop !== labelsCol.scrollTop) {
    container.scrollTop = labelsCol.scrollTop;
  }
}, { passive: true });

/* -------------------------------------------------
   INSTRUMENT MODAL & CUSTOM WAVE LOGIC
   ------------------------------------------------- */
const modal = document.getElementById('instrumentModal');
const modalTitle = document.getElementById('modalTitle');
const modalStyle = document.getElementById('modalStyle');
const saveInstrumentBtn = document.getElementById('saveInstrumentBtn');
const closeBtn = document.getElementsByClassName('close')[0];

const customWaveGroup = document.getElementById('customWaveGroup');
const waveCanvas = document.getElementById('waveCanvas');

document.getElementById('inst0Btn').addEventListener('click', () => openInstrumentModal(0));
document.getElementById('inst1Btn').addEventListener('click', () => openInstrumentModal(1));
// FIX: The Green button (inst2Btn) listener was missing. It is added below:
document.getElementById('inst2Btn').addEventListener('click', () => openInstrumentModal(2)); // <--- THIS WAS MISSING
document.getElementById('inst3Btn').addEventListener('click', () => openInstrumentModal(3));

function openInstrumentModal(instIdx) {
  currentInstrument = instIdx;
  const colors = ['Red', 'Blue', 'Green', 'Yellow'];
  modalTitle.textContent = `${colors[instIdx]} Instrument Settings`;
  
  const currentSettings = instrumentSettings[instIdx];
  const container = document.getElementById('styleControlsContainer');
  const saveBtn = document.getElementById('saveInstrumentBtn');
  const listContainer = document.getElementById('styleListContainer');
  
  // 1. Clean up previous UI state
  // We look for the existing toggle button. If it exists, we keep it but reset it.
  // If not, we create it.
  let styleDisplay = document.getElementById('styleDisplayBtn');
  if (!styleDisplay) {
    styleDisplay = document.createElement('div');
    styleDisplay.id = 'styleDisplayBtn';
    styleDisplay.className = 'style-list-item selected';
    styleDisplay.style.cursor = 'pointer';
    styleDisplay.style.marginBottom = '5px';
    // Insert the button BEFORE the list container
    listContainer.parentElement.insertBefore(styleDisplay, listContainer);
  }

  // 2. Reset Visibility (Start by showing Controls, Hiding List)
  listContainer.style.display = 'none';
  container.style.display = 'block';
  saveBtn.style.display = 'block';

  // 3. Populate the List (Hidden for now)
  listContainer.innerHTML = '';
  Object.keys(STYLE).forEach(key => {
    const instance = getStyle(key);
    const itemDiv = document.createElement('div');
    itemDiv.className = 'style-list-item';
    itemDiv.dataset.value = instance.value;
    itemDiv.textContent = instance.name;

    // Handle Clicking a Style from the list
    itemDiv.addEventListener('click', () => {
      // Update State
      const selectedValue = itemDiv.dataset.value;
      const state = instrumentSettings[currentInstrument];
      state.waveType = selectedValue;

      // Update the Toggle Button Text
      styleDisplay.innerHTML = `<strong>Style:</strong> ${instance.name}`;

      // Update Controls & Visibility
      const styleInstance = getStyleByValue(selectedValue);
      if (styleInstance && selectedValue !== 'mute') {
        const defaults = styleInstance.createDefaultState();
        for (let k in defaults) {
          if (state[k] === undefined) state[k] = defaults[k];
        }
        styleInstance.createControls(container, state, audioCtx);
        container.style.display = 'block';
      } else {
        // Mute selected
        container.innerHTML = '<div style="text-align:center; padding: 10px; opacity: 0.7; color: var(--modal-text);">Muted</div>';
        container.style.display = 'block';
      }

      // Hide List, Show Controls + Save
      listContainer.style.display = 'none';
      saveBtn.style.display = 'block';
    });

    listContainer.appendChild(itemDiv);
  });

  // 4. Set Initial Button Text & Controls
  const currentStyleInstance = getStyleByValue(currentSettings.waveType);
  styleDisplay.innerHTML = `<strong>Style:</strong> ${currentStyleInstance ? currentStyleInstance.name : 'Unknown'}`;

  // Click Handler for the Toggle Button (using closure to capture current instances)
  styleDisplay.onclick = () => {
    const isListVisible = listContainer.style.display === 'block';
    
    if (isListVisible) {
      // SWITCH TO: Controls View
      listContainer.style.display = 'none';
      container.style.display = 'block';
      saveBtn.style.display = 'block';
    } else {
      // SWITCH TO: List View
      listContainer.style.display = 'block';
      container.style.display = 'none';
      saveBtn.style.display = 'none'; // Hide save while picking style
    }
  };

  // 5. Initialize AudioContext if needed
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!masterGain) {
      masterGain = audioCtx.createGain();
      masterGain.gain.value = currentVolume;
      masterGain.connect(audioCtx.destination);
    }
  }
  
  // 6. Render Initial Controls
  if (currentStyleInstance && currentSettings.waveType !== 'mute') {
    currentStyleInstance.createControls(container, currentSettings, audioCtx);
  } else {
    container.innerHTML = '<div style="text-align:center; padding: 10px; opacity: 0.7; color: var(--modal-text);">Muted</div>';
  }
  
  modal.style.display = 'block';
}

closeBtn.onclick = function() { modal.style.display = 'none'; }

let isDrawingWave = false;

function handleWaveDraw(e) {
  const rect = waveCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const pts = instrumentSettings[currentInstrument].customWavePoints;
  if (!pts) return;
  
  const val = 1 - (2 * y / waveCanvas.height);
  
  const startIdx = Math.floor((x / waveCanvas.width) * pts.length);
  const endIdx = Math.min(pts.length, startIdx + 3); 
  for (let i = startIdx; i < endIdx; i++) {
    pts[i] = val;
  }
  
  drawWaveCanvas(currentInstrument);
}

window.addEventListener('mousemove', (e) => {
  if (isDrawingWave) handleWaveDraw(e);
});

window.addEventListener('mouseup', () => {
  isDrawingWave = false;
});

saveInstrumentBtn.onclick = function() {
  const state = instrumentSettings[currentInstrument];
  const styleInstance = getStyleByValue(state.waveType);
  
  // Delegate saving to the style instance
  if(styleInstance) {
    styleInstance.saveSettings(state);
  }
  
  modal.style.display = 'none';
}

window.onclick = function(event) {
  if (event.target == modal) modal.style.display = 'none';
  if (event.target == melodyModal) melodyModal.style.display = 'none';
  if (event.target == genModal) genModal.style.display = 'none';
}

/* -------------------------------------------------
   MELODY PANEL
   ------------------------------------------------- */
const melodyModal = document.getElementById('melodyModal');
const melodyTableBody = document.getElementById('melodyTableBody');
const closeMelody = document.getElementById('closeMelody');
const playBtn = document.getElementById('playBtn');

let pressTimer;
const LONG_PRESS_DURATION = 500; 

function openMelodyPanel() {
  updateMelodyTable();
  melodyModal.style.display = 'block';
}

playBtn.addEventListener('mousedown', (e) => {
  pressTimer = setTimeout(openMelodyPanel, LONG_PRESS_DURATION);
});

playBtn.addEventListener('mouseup', (e) => {
  clearTimeout(pressTimer);
  if (!melodyModal.style.display || melodyModal.style.display === 'none') {
    if (isPlaying) stopPlayback(); else startPlayback();
  }
});

playBtn.addEventListener('mouseleave', () => clearTimeout(pressTimer));
playBtn.addEventListener('touchstart', (e) => {
  pressTimer = setTimeout(openMelodyPanel, LONG_PRESS_DURATION);
}, {passive: true});
playBtn.addEventListener('touchend', (e) => {
  clearTimeout(pressTimer);
  if (!melodyModal.style.display || melodyModal.style.display === 'none') {
    if (isPlaying) stopPlayback(); else startPlayback();
  }
});

closeMelody.onclick = () => melodyModal.style.display = 'none';

function generateMelodyList() {
  const list = [];
  for (let step = 0; step < STEPS; step++) {
    for (let pitch = 0; pitch < PITCHES.length; pitch++) {
      const mask = notes[step][pitch];
      if (!mask) continue;
      for (let i = 0; i < 4; i++) {
        const bit = 1 << i;
        if (mask & bit) {
          if (step > 0 && (notes[step-1][pitch] & bit) && instrumentSettings[i].hold) continue;
          let durationSteps = 1;
          if (instrumentSettings[i].hold) {
            for (let k = step + 1; k < STEPS; k++) {
              if (notes[k][pitch] & bit) durationSteps++; else break;
            }
          }
          list.push({
            note: PITCHES[pitch],
            freq: midiToFreq(pitchToMidi(pitch)),
            time: Math.round(step * stepSec * 1000),
            duration: Math.round(durationSteps * stepSec * 1000),
            instrument: i 
          });
        }
      }
    }
  }
  list.sort((a, b) => a.time - b.time);
  return list;
}

function updateMelodyTable() {
  const list = generateMelodyList();
  melodyTableBody.innerHTML = '';
  if (list.length === 0) {
    melodyTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center">No notes recorded</td></tr>';
    return;
  }
  list.forEach(n => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${n.note}</td><td>${n.freq.toFixed(2)}</td><td>${n.time}</td><td>${n.duration}</td>`;
    melodyTableBody.appendChild(tr);
  });
}

/* -------------------------------------------------
   JSON IMPORT / EXPORT
   ------------------------------------------------- */
   
// Helper function to parse and load JSON data with Progress
function loadMelodyFromJson(jsonString) {
  // 1. Show Progress Modal
  const progressModal = document.getElementById('progressModal');
  const progressFill = document.getElementById('progressBarFill');
  const progressText = document.getElementById('progressText');
  const progressTitle = document.getElementById('progressTitle');
  
  progressTitle.textContent = "Importing JSON...";
  progressFill.style.width = '0%';
  progressText.textContent = 'Reading file...';
  progressModal.style.display = 'block';

  let data;

  setTimeout(() => {
    try {
      // Phase 1: Parsing
      progressFill.style.width = '10%';
      data = JSON.parse(jsonString);
      progressFill.style.width = '20%';
      progressText.textContent = 'Validating structure...';

      // Validation
      if (typeof data !== 'object' || data === null) throw new Error("JSON root must be an object.");
      if (!data.notes || !Array.isArray(data.notes)) throw new Error("Missing or invalid 'notes' array.");
      
      // Handle BPM (Must happen before calculating steps from time)
      if (data.bpm !== undefined) {
        if (typeof data.bpm !== 'number' || isNaN(data.bpm) || data.bpm < 20 || data.bpm > 300) throw new Error("Invalid BPM value.");
        updateTempo(data.bpm);
        document.getElementById('bpmInput').value = TEMPO;
      }

      if (data.subdivision !== undefined && data.subdivision !== SUBDIV) {
        throw new Error(`Subdivision mismatch. Expected ${SUBDIV}, got ${data.subdivision}.`);
      }

      if (!data.name) data.name = "Imported Composition";
      if (!data.date) data.date = new Date().toISOString();

      // --- Calculate required grid size ---
      progressText.textContent = 'Analyzing duration...';
      let maxStep = 0;
      
      data.notes.forEach(n => {
        if (typeof n.time !== 'number' || typeof n.duration !== 'number') return;
        const startStep = Math.round(n.time / 1000 / stepSec);
        const durSteps = Math.round(n.duration / 1000 / stepSec);
        const endStep = startStep + durSteps;
        if (endStep > maxStep) maxStep = endStep;
      });

      const requiredSteps = maxStep + SUBDIV;
      
      // 1. Expand Data Array
      expandGridToSteps(requiredSteps);
      
      // 2. Update Visual Scrollbar (The Fix)
      updateSongLength();
      // -----------------------------------

      pushUndo();

      // Phase 2: Clear Grid
      progressFill.style.width = '30%';
      progressText.textContent = 'Clearing grid...';
      for (let i = 0; i < notes.length; i++) notes[i].fill(0);

      // Phase 3: Parse Notes
      const totalNotes = data.notes.length;
      const batchSize = 100; 
      let processedCount = 0;

      function processChunk(startIdx) {
        const endIdx = Math.min(startIdx + batchSize, totalNotes);
        
        for (let i = startIdx; i < endIdx; i++) {
          const n = data.notes[i];
          if (typeof n.note !== 'string' || typeof n.time !== 'number') continue;

          const pitchIdx = PITCHES.indexOf(n.note);
          if (pitchIdx === -1) continue;

          const step = Math.round(n.time / 1000 / stepSec);
          // Safety check against expanded size
          if (step < 0 || step >= notes.length) continue;

          const durationSteps = Math.round(n.duration / 1000 / stepSec);
          const instIdx = (n.instrument !== undefined && n.instrument >= 0 && n.instrument < 4) ? n.instrument : 0;
          const bit = 1 << instIdx;

          for (let k = 0; k < durationSteps; k++) {
            const s = step + k;
            if (s < notes.length) notes[s][pitchIdx] |= bit;
          }
        }

        processedCount = endIdx;
        const percent = Math.round(30 + (processedCount / totalNotes) * 70);
        progressFill.style.width = percent + '%';
        progressText.textContent = `Processing notes (${processedCount}/${totalNotes})...`;

        if (processedCount < totalNotes) {
          requestAnimationFrame(() => processChunk(processedCount));
        } else {
          progressModal.style.display = 'none';
          redrawAll();
          
          // FIX: Update the melody table on completion
          updateMelodyTable(); 
          
          if (isPlaying) stopPlayback();
        }
      }

      if (totalNotes > 0) processChunk(0);
      else {
        progressModal.style.display = 'none';
        redrawAll();
        // FIX: Update even if empty
        updateMelodyTable();
      }

    } catch (e) {
      progressModal.style.display = 'none';
      alert("Declarative Error: " + e.message);
    }
  }, 50);
}

// Unified handler for Audio Import (used by Button and Drag/Drop)
async function handleAudioFileImport(file) {
  if (!file) return;
  
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // 1. Setup Progress Modal
  const progressModal = document.getElementById('progressModal');
  const progressFill = document.getElementById('progressBarFill');
  const progressText = document.getElementById('progressText');
  const progressTitle = document.getElementById('progressTitle');
  
  progressTitle.textContent = "Importing Audio...";
  progressFill.style.width = '0%';
  progressText.textContent = 'Reading file...';
  progressModal.style.display = 'block';

  try {
    // 2. Read File with Progress
    const arrayBuffer = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      
      reader.onprogress = (evt) => {
        if (evt.lengthComputable) {
          const percentLoaded = (evt.loaded / evt.total) * 30;
          progressFill.style.width = percentLoaded + '%';
          progressText.textContent = `Reading file... ${Math.round((evt.loaded / evt.total) * 100)}%`;
        }
      };
      reader.readAsArrayBuffer(file);
    });
    
    // 3. Decode Audio (30% -> 60%)
    progressFill.style.width = '35%';
    progressText.textContent = 'Decoding audio...';
    
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    
    progressFill.style.width = '60%';
    progressText.textContent = 'Analysis starting...';
    
    // 4. Convert to Notes (60% -> 100%)
    const melodyList = await analyzeAudioBuffer(audioBuffer, progressFill, progressText);
    
    progressFill.style.width = '100%';
    progressText.textContent = 'Done!';
    
    setTimeout(() => {
      progressModal.style.display = 'none';
      
      // Scroll to the beginning so the user can see the imported notes
      container.scrollLeft = 0;
      
      updateMelodyTable(); 
      
    }, 200);

  } catch (err) {
    console.error(err);
    progressModal.style.display = 'none';
    alert("Error processing audio file: " + err.message);
  }
}

/**
 * Performs a standard Cooley-Tukey FFT on a real-valued segment.
 * Applies Hanning window internally.
 * @param {Float32Array} segment - The time-domain audio samples.
 * @returns {Object} Complex arrays {real, imag}
 */
function performFFT(segment) {
  const n = segment.length;
  const real = new Float32Array(n);
  const imag = new Float32Array(n);

  // 1. Apply Hanning Window to reduce spectral leakage
  for (let i = 0; i < n; i++) {
    const window = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (n - 1)));
    real[i] = segment[i] * window;
    imag[i] = 0;
  }

  // 2. Bit-reversal permutation
  for (let i = 0, j = 0; i < n; i++) {
    if (i < j) {
      [real[i], real[j]] = [real[j], real[i]];
      [imag[i], imag[j]] = [imag[j], imag[i]];
    }
    let m = n >> 1;
    while (m >= 1 && j >= m) {
      j -= m;
      m >>= 1;
    }
    j += m;
  }

  // 3. Butterfly computations
  for (let len = 2; len <= n; len <<= 1) {
    const ang = (2 * Math.PI) / len;
    const wreal = Math.cos(ang);
    const wimag = -Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let ur = 1, ui = 0;
      for (let j = 0; j < len / 2; j++) {
        const tr = real[i + j + len / 2] * ur - imag[i + j + len / 2] * ui;
        const ti = real[i + j + len / 2] * ui + imag[i + j + len / 2] * ur;
        real[i + j + len / 2] = real[i + j] - tr;
        imag[i + j + len / 2] = imag[i + j] - ti;
        real[i + j] += tr;
        imag[i + j] += ti;
        const tmpur = ur * wreal - ui * wimag;
        ui = ur * wimag + ui * wreal;
        ur = tmpur;
      }
    }
  }

  return { real, imag };
}

async function analyzeAudioBuffer(buffer, progressFill, progressText) {
  const data = buffer.getChannelData(0);
  const sampleRate = buffer.sampleRate;
  const fftSize = 4096; 
  const threshold = 0.02; 
  
  if (typeof pushUndo === 'function') pushUndo();

  const durationSec = buffer.duration;
  const stepsNeeded = Math.ceil(durationSec / stepSec);

  if (stepsNeeded > STEPS) {
    progressText.textContent = `Expanding grid...`;
    await new Promise(r => setTimeout(r, 50));
    if (typeof expandGridToSteps === 'function') expandGridToSteps(stepsNeeded);
    // FIX: Update the virtual scrollbar so the user can scroll to see imported notes
    if (typeof updateSongLength === 'function') updateSongLength();
  }

  // Reset note grid
  notes.forEach(step => step.fill(0));

  const totalSteps = stepsNeeded; 
  
  const processChunk = async (startStep) => {
    const batchSize = 50; 
    const endStep = Math.min(startStep + batchSize, totalSteps);
    
    for (let s = startStep; s < endStep; s++) {
      const startSample = Math.floor(s * stepSec * sampleRate);
      
      // Safety check for buffer bounds
      if (startSample + fftSize > data.length) break;

      // Extract segment directly from data
      const segment = data.subarray(startSample, startSample + fftSize);
      
      // Compute spectrum
      const spectrum = performFFT(segment);

      // Analyze frequencies for MIDI notes 21 (A0) to 108 (C8)
      for (let midi = 21; midi <= 108; midi++) {
        const targetFreq = 440 * Math.pow(2, (midi - 69) / 12);
        const magnitude = getMagnitudeAtFreq(spectrum, targetFreq, sampleRate, fftSize);
        
        if (magnitude > threshold) {
          const pitchIdx = 107 - midi; // Map MIDI to grid (Top-down)
          if (notes[s] && pitchIdx >= 0 && pitchIdx < notes[s].length) {
            notes[s][pitchIdx] = 1;
          }
        }
      }
    }
    
    // UI Update (Scale analysis progress: 60% -> 100%)
    const analysisProgress = (endStep / totalSteps);
    const totalPercent = 60 + Math.round(analysisProgress * 40);
    
    progressFill.style.width = `${totalPercent}%`;
    progressText.textContent = `Analyzing Polyphony: ${Math.round(analysisProgress * 100)}%`;
    
    if (endStep < totalSteps) {
      await new Promise(r => requestAnimationFrame(r));
      return processChunk(endStep);
    }
  };

  await processChunk(0);
  if (typeof redrawAll === 'function') redrawAll();
  return typeof generateMelodyList === 'function' ? generateMelodyList() : null;
}

// --- HELPER UTILITIES ---

/**
 * Maps a target frequency to the nearest FFT bin and returns magnitude.
 */
function getMagnitudeAtFreq(spectrum, targetFreq, sampleRate, fftSize) {
  // Calculate bin index
  const binIndex = Math.round((targetFreq * fftSize) / sampleRate);
  
  // Ignore frequencies above Nyquist (FFT size / 2)
  if (binIndex >= fftSize / 2) return 0;

  const r = spectrum.real[binIndex];
  const i = spectrum.imag[binIndex];
  
  // Return magnitude (normalized)
  return Math.sqrt(r * r + i * i) / (fftSize / 2);
}

/* -------------------------------------------------
   SELECTION STATE
   ------------------------------------------------- */
let selectedCorners = [];
let isSelecting = false;
let isDraggingSelection = false;
let selectionRect = { x1: 0, y1: 0, x2: 0, y2: 0 };
let dragStart = { x: 0, y: 0 };
let dragOffset = { x: 0, y: 0 };

/* -------------------------------------------------
   COPY / PASTE LOGIC
   ------------------------------------------------- */
function handleCopy() {
  if (selectedCorners.length === 0) return;
  
  // Find top-left corner of selection to normalize coordinates
  let minStep = Infinity, minPitch = Infinity;
  selectedCorners.forEach(c => {
    if (c.step < minStep) minStep = c.step;
    if (c.pitch < minPitch) minPitch = c.pitch;
  });
  
  clipboard = selectedCorners.map(c => ({
    dStep: c.step - minStep,
    dPitch: c.pitch - minPitch,
    instIdx: c.instIdx
  }));
}

function handlePaste() {
  if (clipboard.length === 0) return;
  
  pushUndo(); 
  
  const anchorStep = (hoverStep >= 0) ? hoverStep : 0;
  const anchorPitch = (hoverPitch >= 0) ? hoverPitch : 0;
  
  let maxStepNeeded = 0;
  
  // Calculate the furthest step needed for this paste operation
  clipboard.forEach(c => {
    const targetStep = anchorStep + c.dStep;
    if(targetStep > maxStepNeeded) maxStepNeeded = targetStep;
  });

  // RELIABILITY FIX: Grow the grid if pasting past the end
  if (maxStepNeeded >= notes.length) {
     expandGridToSteps(maxStepNeeded + (SUBDIV * 4));
     updateSongLength(); 
  }
  
  const newSelection = [];
  
  clipboard.forEach(c => {
    const targetStep = anchorStep + c.dStep;
    const targetPitch = anchorPitch + c.dPitch;
    
    // Check boundaries (safe now that grid is expanded)
    if (targetStep >= 0 && targetStep < notes.length && targetPitch >= 0 && targetPitch < PITCHES.length) {
      const bit = 1 << c.instIdx;
      
      notes[targetStep][targetPitch] |= bit;
      newSelection.push({ 
        step: targetStep, 
        pitch: targetPitch, 
        instIdx: c.instIdx
      });
    }
  });
  
  selectedCorners = newSelection;
  redrawAll();
}

/* -------------------------------------------------
   DRAWING (VIRTUALIZED)
   ------------------------------------------------- */
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function drawGrid(startStep, endStep, scrollLeft, startPitch, endPitch, scrollTop) {
  // Use solid colors for brighter grid lines
  const gridColor = lightModeToggle.checked ? '#bbbbbb' : '#444444';
  const gridTextColor = getComputedStyle(document.body).getPropertyValue('--grid-text').trim();
  const pairRowBg = getComputedStyle(document.body).getPropertyValue('--pair-row-bg').trim();

  // 1. Row Stripes (Virtualized)
  ctx.fillStyle = pairRowBg;
  for (let y = startPitch; y <= endPitch; y++) {
    if (y < 0 || y >= PITCHES.length) continue;
    // Calculate screen Y relative to scroll
    const screenY = (y * CELL_H) - scrollTop;
    if (y % 2 === 1) ctx.fillRect(0, screenY, canvas.width, CELL_H);
  }

  // 2. Vertical Lines (Brighter)
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = startStep; x <= endStep; x++) {
    const screenX = (x * CELL_W) - scrollLeft;
    ctx.moveTo(screenX, 0);
    ctx.lineTo(screenX, canvas.height);
  }
  ctx.stroke();
  
  // Horizontal lines (Brighter)
  ctx.beginPath();
  for (let y = startPitch; y <= endPitch; y++) {
     const screenY = (y * CELL_H) - scrollTop;
     ctx.moveTo(0, screenY);
     ctx.lineTo(canvas.width, screenY);
  }
  ctx.stroke();
  
  // 3. Beat Numbers
  ctx.fillStyle = gridTextColor;
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  
  const startBeat = Math.floor(startStep / SUBDIV);
  const endBeat = Math.ceil(endStep / SUBDIV);
  
  for (let b = startBeat; b <= endBeat; b++) {
    const screenX = (b * CELL_W * SUBDIV) - scrollLeft + (CELL_W * SUBDIV) / 2;
    ctx.fillText(b + 1, screenX, 14);
  }
}

/* -------------------------------------------------
   DRAWING (VIRTUALIZED)
   ------------------------------------------------- */

function redrawAll() {
  if (!ctx) return;
  clearCanvas();
  
  // 1. Get Scroll State
  const scrollLeft = container.scrollLeft;
  const scrollTop = container.scrollTop;
  
  // 2. Calculate Visible Indices (Virtualization)
  // We only render what is visible on screen + a small buffer
  const viewWidth = canvas.width;
  const viewHeight = canvas.height;
  
  const startStep = Math.floor(scrollLeft / CELL_W);
  const endStep = Math.ceil((scrollLeft + viewWidth) / CELL_W);
  
  const startPitch = Math.floor(scrollTop / CELL_H);
  const endPitch = Math.ceil((scrollTop + viewHeight) / CELL_H);
  
  // 3. Render Layers (Order matters)
  drawGrid(startStep, endStep, scrollLeft, startPitch, endPitch, scrollTop);
  drawNotes(startStep, endStep, scrollLeft, startPitch, endPitch, scrollTop);
  drawHighlight(scrollLeft, scrollTop);
  
  // 4. Render UI Overlays (Selection/Drag)
  if (isSelecting) drawSelectionBox(scrollLeft, scrollTop);
  if (selectedCorners.length > 0 && !isDraggingSelection) drawSelectionBorders(scrollLeft, scrollTop);
  if (isDraggingSelection) drawDraggedNotes(scrollLeft, scrollTop);
}

// Update the "Virtual" size of the song (the scrollbar area)
function updateSongLength() {
  // 1. Horizontal Length (Time)
  const bufferBeats = 100;
  const minSteps = (BEATS + bufferBeats) * SUBDIV;
  const steps = Math.max(notes.length, minSteps);
  const totalWidth = steps * CELL_W;
  gridSpacer.style.width = totalWidth + 'px';
  
  // 2. Vertical Length (Pitches)
  // We force the height to accommodate all pitches so we can scroll down
  const totalHeight = PITCHES.length * CELL_H;
  verticalSpacer.style.height = totalHeight + 'px';
  
  // Ensure our notes array covers this new length
  expandGridToSteps(steps);
}

function drawSelectionBox(scrollLeft, scrollTop) {
  // Convert absolute rect coordinates to screen coordinates
  const x1 = Math.min(selectionRect.x1, selectionRect.x2) - scrollLeft;
  const x2 = Math.max(selectionRect.x1, selectionRect.x2) - scrollLeft;
  
  // FIX: Apply scrollTop offset to Y coordinates
  const y1 = Math.min(selectionRect.y1, selectionRect.y2) - scrollTop;
  const y2 = Math.max(selectionRect.y1, selectionRect.y2) - scrollTop;
  
  const w = x2 - x1;
  const h = y2 - y1;
  
  ctx.strokeStyle = lightModeToggle.checked ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.strokeRect(x1, y1, w, h);
  ctx.setLineDash([]);
}

function drawSelectionBorders(scrollLeft, scrollTop) {
  const borderColor = lightModeToggle.checked ? '#000000' : '#ffffff';
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;

  selectedCorners.forEach(c => {
    // FIX: Apply scroll offsets to convert grid coords to screen coords
    const screenX = (c.step * CELL_W) - scrollLeft;
    const screenY = (c.pitch * CELL_H) - scrollTop;
    
    const w2 = CELL_W / 2;
    const h2 = CELL_H / 2;
    let cx = screenX;
    let cy = screenY;
    if (c.instIdx === 1 || c.instIdx === 3) cx += w2;
    if (c.instIdx === 2 || c.instIdx === 3) cy += h2;

    ctx.strokeRect(cx, cy, w2, h2);
  });
}

function drawDraggedNotes(scrollLeft, scrollTop) {
  const stepDeltaPx = dragOffset.x;
  const pitchDeltaPx = dragOffset.y;
  
  // Calculate snapped grid movement
  const snapStep = Math.round(stepDeltaPx / CELL_W);
  const snapPitch = Math.round(pitchDeltaPx / CELL_H);

  ctx.globalAlpha = 0.6;

  selectedCorners.forEach(c => {
    // Calculate base screen position
    const baseScreenX = (c.step * CELL_W) - scrollLeft;
    const baseScreenY = (c.pitch * CELL_H) - scrollTop;
    
    const w2 = CELL_W / 2;
    const h2 = CELL_H / 2;
    let cx = baseScreenX;
    let cy = baseScreenY;
    if (c.instIdx === 1 || c.instIdx === 3) cx += w2;
    if (c.instIdx === 2 || c.instIdx === 3) cy += h2;

    // Apply snapped offset for visual
    const finalX = cx + (snapStep * CELL_W);
    const finalY = cy + (snapPitch * CELL_H);

    ctx.fillStyle = getWaveColor(c.instIdx);
    ctx.fillRect(finalX + 1, finalY + 1, w2 - 2, h2 - 2);
    
    ctx.strokeStyle = lightModeToggle.checked ? '#000' : '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(finalX, finalY, w2, h2);
  });

  ctx.globalAlpha = 1.0;
}

let hoverStep = -1;
let hoverPitch = -1;

function drawHighlight(scrollLeft, scrollTop) {
  if (isSelecting || isDraggingSelection) return;
  if (hoverStep < 0 || hoverPitch < 0) return;
  
  const highlightColor = getComputedStyle(document.body).getPropertyValue('--highlight-color').trim();
  const highlightIntersection = getComputedStyle(document.body).getPropertyValue('--highlight-intersection').trim();
  
  // --- 1. Column Highlight (Vertical) ---
  const screenX = (hoverStep * CELL_W) - scrollLeft;
  // Only draw column if visible
  if (screenX > -CELL_W && screenX < canvas.width) {
    ctx.fillStyle = highlightColor;
    ctx.fillRect(screenX, 0, CELL_W, canvas.height);
  }

  // --- 2. Row Highlight (Horizontal) ---
  const screenY = (hoverPitch * CELL_H) - scrollTop;
  // Only draw row if visible
  if (screenY > -CELL_H && screenY < canvas.height) {
    ctx.fillStyle = highlightColor;
    ctx.fillRect(0, screenY, canvas.width, CELL_H);
    
    // --- 3. Intersection Highlight ---
    if (screenX > -CELL_W && screenX < canvas.width) {
      ctx.fillStyle = highlightIntersection;
      ctx.fillRect(screenX, screenY, CELL_W, CELL_H);
    }
  }

  // --- 4. Update Label Column (Sidebar) ---
  // This handles the left-side row highlight without changing redrawAll
  const labels = labelsCol.querySelectorAll('.label-row');
  labels.forEach((el, idx) => {
    if (idx === hoverPitch) {
      el.classList.add('highlight');
    } else {
      el.classList.remove('highlight');
    }
  });
}

function drawNotes(startStep, endStep, scrollLeft, startPitch, endPitch, scrollTop) {
  // Iterate only through visible steps and pitches
  for (let step = startStep; step <= endStep; step++) {
    if (step < 0 || step >= notes.length) continue;

    // Optimization: Only iterate visible pitches
    for (let pitch = startPitch; pitch <= endPitch; pitch++) {
      if (pitch < 0 || pitch >= PITCHES.length) continue;

      const mask = notes[step][pitch];
      if (!mask) continue;
      
      // Calculate screen position
      const screenX = (step * CELL_W) - scrollLeft;
      const screenY = (pitch * CELL_H) - scrollTop;
      
      for (let i = 0; i < 4; i++) {
        if (mask & (1 << i)) {
           // Skip drawing if currently dragging this note
           if (isDraggingSelection && selectedCorners.some(c => c.step===step && c.pitch===pitch && c.instIdx===i)) continue;
           drawCorner(screenX, screenY, i);
        }
      }
    }
  }
}

function drawCorner(cellX, cellY, instIdx) {
  const w = CELL_W / 2;
  const h = CELL_H / 2;
  let cx = cellX;
  let cy = cellY;
  
  // Determine which quadrant to draw in
  if (instIdx === 1) cx = cellX + w;
  if (instIdx === 2) cy = cellY + h;
  if (instIdx === 3) { cx = cellX + w; cy = cellY + h; }
  
  // Draw the colored background
  ctx.fillStyle = getWaveColor(instIdx);
  ctx.fillRect(cx + 1, cy + 1, w - 2, h - 2);

  // Setup styles for the triangle icon
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 1;

  // Padding from the edge of the sub-cell
  const pad = 2;

  // Draw a triangle touching all three relevant corners based on quadrant
  ctx.beginPath();
  
  switch (instIdx) {
    case 0: // Top-Left -> Triangle points Bottom-Left
      ctx.moveTo(cx + w - pad, cy + pad);         // Top-Right corner
      ctx.lineTo(cx + w - pad, cy + h - pad);     // Bottom-Right corner
      ctx.lineTo(cx + pad, cy + h - pad);         // Bottom-Left corner
      break;
    case 1: // Top-Right -> Triangle points Bottom-Right
      ctx.moveTo(cx + pad, cy + pad);             // Top-Left corner
      ctx.lineTo(cx + w - pad, cy + h - pad);     // Bottom-Right corner
      ctx.lineTo(cx + pad, cy + h - pad);         // Bottom-Left corner
      break;
    case 2: // Bottom-Left -> Triangle points Top-Left
      ctx.moveTo(cx + pad, cy + pad);             // Top-Left corner
      ctx.lineTo(cx + w - pad, cy + pad);         // Top-Right corner
      ctx.lineTo(cx + w - pad, cy + h - pad);     // Bottom-Right corner
      break;
    case 3: // Bottom-Right -> Triangle points Top-Right
      ctx.moveTo(cx + pad, cy + pad);             // Top-Left corner
      ctx.lineTo(cx + w - pad, cy + pad);         // Top-Right corner
      ctx.lineTo(cx + pad, cy + h - pad);         // Bottom-Left corner
      break;
  }
  
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function getWaveColor(i) {
  const colors = ['#d32f2f', '#1976d2', '#388e3c', '#fbc02d'];
  return colors[i % colors.length];
}

/* -------------------------------------------------
   INTERACTION LOGIC (UPDATED FOR SCROLL)
   ------------------------------------------------- */
   
function toggleNoteAt(mouseX, mouseY, scrollLeft, scrollTop, isCtrlClick = false) {
  // Convert screen mouse X/Y to absolute grid step/pitch
  let step = Math.floor((mouseX + scrollLeft) / CELL_W);
  const pitch = Math.floor((mouseY + scrollTop) / CELL_H); 

  // RELIABILITY FIX: Check if we are clicking at or past the edge
  if (step >= notes.length) {
     // Expand the grid to fit the new note + a buffer for scrolling
     expandGridToSteps(step + (SUBDIV * 4));
     // Force the scrollbar to update so the user sees the growth
     updateSongLength(); 
  }

  if (step < 0 || step >= notes.length || pitch < 0 || pitch >= PITCHES.length) return;
  
  pushUndo(); 
  
  const relX = (mouseX + scrollLeft) - (step * CELL_W); 
  const relY = (mouseY + scrollTop) - (pitch * CELL_H);
  
  const left = relX < CELL_W / 2;
  const top = relY < CELL_H / 2;
  const instIdx = (top ? 0 : 2) + (left ? 0 : 1);
  
  const instBit = 1 << instIdx;
  if (notes[step][pitch] & instBit) {
    notes[step][pitch] &= ~instBit; 
  } else {
    notes[step][pitch] |= instBit; 
  }
  
  redrawAll();
}

function deleteSelectedNotes() {
  if (selectedCorners.length === 0) return;
  
  pushUndo(); // Save state for undo
  
  selectedCorners.forEach(c => {
    const bit = 1 << c.instIdx;
    notes[c.step][c.pitch] &= ~bit;
  });
  
  selectedCorners = []; // Clear selection
  redrawAll(); // Redraw to show notes are gone AND selection is gone
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(cloneNotes());
  const previous = undoStack.pop();
  for (let i = 0; i < STEPS; i++) notes[i] = new Uint8Array(previous[i]);
  selectedCorners = []; // Deselect on undo
  redrawAll();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(cloneNotes());
  const next = redoStack.pop();
  for (let i = 0; i < STEPS; i++) notes[i] = new Uint8Array(next[i]);
  selectedCorners = []; // Deselect on redo
  redrawAll();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(cloneNotes());
  const next = redoStack.pop();
  for (let i = 0; i < STEPS; i++) notes[i] = new Uint8Array(next[i]);
  selectedCorners = []; // Deselect on redo
  redrawAll();
}

/* -------------------------------------------------
   MOVE SELECTION HELPER
   ------------------------------------------------- */

function moveSelection(dStep, dPitch) {
  if (selectedCorners.length === 0) return;

  // 1. Calculate new positions and validate bounds
  let maxStepNeeded = 0;
  
  for (let c of selectedCorners) {
    const newStep = c.step + dStep;
    if (newStep > maxStepNeeded) maxStepNeeded = newStep;
  }

  // RELIABILITY FIX: Expand grid if we dragged past the end
  if (maxStepNeeded >= notes.length) {
     expandGridToSteps(maxStepNeeded + (SUBDIV * 4));
     updateSongLength();
  }

  // Re-check boundaries now that grid is potentially expanded
  // (We allow movement if steps are valid, otherwise we cancel the move)
  for (let c of selectedCorners) {
      const newStep = c.step + dStep;
      const newPitch = c.pitch + dPitch;
      if (newStep < 0 || newPitch < 0 || newPitch >= PITCHES.length) {
          return; // Stop if out of bounds (vertically or start of song)
      }
  }

  // 2. Save state for Undo
  pushUndo();

  // 3. Apply changes
  // Clear old positions
  selectedCorners.forEach(c => {
    const bit = 1 << c.instIdx;
    notes[c.step][c.pitch] &= ~bit;
  });

  // Set new positions
  const newCorners = [];
  selectedCorners.forEach(c => {
    const newStep = c.step + dStep;
    const newPitch = c.pitch + dPitch;

    const bit = 1 << c.instIdx;
    notes[newStep][newPitch] |= bit;
    
    newCorners.push({
      step: newStep,
      pitch: newPitch,
      instIdx: c.instIdx
    });
  });

  // 4. Update selection state
  selectedCorners = newCorners;
  
  redrawAll();
}

function deleteSelectedNotes() {
  if (selectedCorners.length === 0) return;
  
  pushUndo(); // Save state for undo
  
  selectedCorners.forEach(c => {
    const bit = 1 << c.instIdx;
    notes[c.step][c.pitch] &= ~bit;
  });
  
  selectedCorners = []; // Clear selection
  redrawAll(); // Redraw to show notes are gone AND selection is gone
}

/* -------------------------------------------------
   FLIP SELECTION HELPERS
   ------------------------------------------------- */

function flipSelectionHorizontal() {
  if (selectedCorners.length === 0) return;

  // 1. Calculate Bounding Box
  let minStep = Infinity, maxStep = -Infinity;
  selectedCorners.forEach(c => {
    if (c.step < minStep) minStep = c.step;
    if (c.step > maxStep) maxStep = c.step;
  });

  // Center of the selection in steps
  const centerX = (minStep + maxStep) / 2;

  pushUndo();

  // 2. Clear old positions first
  selectedCorners.forEach(c => {
    const bit = 1 << c.instIdx;
    notes[c.step][c.pitch] &= ~bit;
  });

  // 3. Calculate and place new positions
  const newCorners = [];
  
  selectedCorners.forEach(c => {
    // New Step = Center + (Center - Old Step) = 2*Center - Old Step
    const newStep = Math.round(2 * centerX - c.step);

    // Boundary check
    if (newStep >= 0 && newStep < STEPS) {
      const bit = 1 << c.instIdx;
      // Use c.pitch directly
      notes[newStep][c.pitch] |= bit;
      
      newCorners.push({
        step: newStep,
        pitch: c.pitch,
        instIdx: c.instIdx
      });
    }
  });

  selectedCorners = newCorners;
  redrawAll();
}

function flipSelectionVertical() {
  if (selectedCorners.length === 0) return;

  // 1. Calculate Bounding Box
  let minPitch = Infinity, maxPitch = -Infinity;
  selectedCorners.forEach(c => {
    if (c.pitch < minPitch) minPitch = c.pitch;
    if (c.pitch > maxPitch) maxPitch = c.pitch;
  });

  // Center of the selection in pitches
  const centerY = (minPitch + maxPitch) / 2;

  pushUndo();

  // 2. Prepare new positions
  const newCorners = [];

  // Clear old positions first
  selectedCorners.forEach(c => {
    const bit = 1 << c.instIdx;
    notes[c.step][c.pitch] &= ~bit;
  });

  // Calculate and place new positions
  selectedCorners.forEach(c => {
    // New Pitch = Center + (Center - Old Pitch) = 2*Center - Old Pitch
    const newPitch = Math.round(2 * centerY - c.pitch);
    
    // Step remains the same
    const newStep = c.step;

    // Boundary check
    if (newPitch >= 0 && newPitch < PITCHES.length) {
      const bit = 1 << c.instIdx;
      notes[newStep][newPitch] |= bit;
      
      newCorners.push({
        step: newStep,
        pitch: newPitch,
        instIdx: c.instIdx
      });
    }
  });

  selectedCorners = newCorners;
  redrawAll();
}

window.addEventListener('keydown', e => {
  const active = document.activeElement;
  // Ignore shortcuts if typing in an input field
  if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA')) return;
  
  if (e.key === 'Home') {
    e.preventDefault();
    container.scrollLeft = 0;
    return;
  }
  
  if (e.key === 'End') {
    e.preventDefault();
    const lastStep = findLastStep();
    
    if (lastStep === -1) {
      // If grid is empty, go to start
      container.scrollLeft = 0;
    } else {
      // Calculate scroll position to show the last note
      // We scroll so the last note is near the right edge of the screen
      const targetPixel = (lastStep + 2) * CELL_W; // +2 for a little buffer
      const scrollTo = targetPixel - container.clientWidth;
      container.scrollLeft = Math.max(0, scrollTo);
    }
    return;
  }
  
  // Handle Delete / Backspace
  if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault(); 
    deleteSelectedNotes();
    return;
  }

  // Handle Copy (C)
  if (e.ctrlKey && (e.key === 'c' || e.key === 'C')) {
    e.preventDefault();
    handleCopy();
    return;
  }

  // Handle Paste (V)
  if (e.ctrlKey && (e.key === 'v' || e.key === 'V')) {
    e.preventDefault();
    handlePaste();
    return;
  }

  // Handle Cut (X)
  if (e.key === 'x' || e.key === 'X') {
    e.preventDefault();
    handleCopy(); // Copy first
    deleteSelectedNotes(); // Then delete
    return;
  }
  
  // Handle Select All (A)
  if (e.key === 'a' || e.key === 'A') {
    e.preventDefault();
    
    // If Ctrl is held, we add to selection, otherwise we replace it
    if (!e.ctrlKey) selectedCorners = [];
      
    // Iterate through the entire grid to find notes
    for (let step = 0; step < STEPS; step++) {
      for (let pitch = 0; pitch < PITCHES.length; pitch++) {
        const mask = notes[step][pitch];
        if (mask === 0) continue;
          
        // Check all 4 instruments
        for (let i = 0; i < 4; i++) {
          const instBit = 1 << i;

          if (mask & instBit) {
            selectedCorners.push({ step, pitch, instIdx: i});
          }
        }
      }
    }
    redrawAll();
    return;
  }

  // Undo (Z)
  if (e.key === 'z' || e.key === 'Z') { 
    e.preventDefault(); 
    undo(); 
    return; 
  }
  
  // Redo (Y)
  if (e.key === 'y' || e.key === 'Y') { 
    e.preventDefault(); 
    redo(); 
    return; 
  }
  
  // Handle Flip Vertical (V)
  if (e.key === 'v' || e.key === 'V') {
    // Only flip if we aren't typing in an input field
    if (!(active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA'))) {
      e.preventDefault();
      flipSelectionVertical();
      return;
    }
  }

  // Handle Flip Horizontal (H)
  if (e.key === 'h' || e.key === 'H') {
    if (!(active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA'))) {
      e.preventDefault();
      flipSelectionHorizontal();
      return;
    }
  }

  if (e.code === 'Space') {
    e.preventDefault();
    if (isPlaying) stopPlayback(); else startPlayback();
    return;
  }
  
    // Ctrl + Arrow Keys: Move Selection
    if (e.ctrlKey) {
      let dStep = 0, dPitch = 0;
      if (e.key === 'ArrowUp') dPitch = -1;
      if (e.key === 'ArrowDown') dPitch = 1;
      if (e.key === 'ArrowLeft') dStep = -1;
      if (e.key === 'ArrowRight') dStep = 1;
      
      moveSelection(dStep, dPitch);
   } else if (e.shiftKey) { // Shift + Arrow Keys: Pan View by Screen
      e.preventDefault(); // Prevent browser history navigation (Back/Forward)
    
      const viewW = container.clientWidth;
      const viewH = container.clientHeight;
    
      switch (e.key) {
        case 'ArrowUp': container.scrollTop -= viewH; break;
        case 'ArrowDown': container.scrollTop += viewH; break;
        case 'ArrowLeft': container.scrollLeft -= viewW; break;
        case 'ArrowRight': container.scrollLeft += viewW; break;
      }
    } else {
      // Arrow Keys (No Ctrl): Pan View
      switch (e.key) {
        case 'ArrowUp': container.scrollTop -= CELL_H; break;
        case 'ArrowDown': container.scrollTop += CELL_H; break;
        case 'ArrowLeft': container.scrollLeft -= CELL_W; break;
        case 'ArrowRight': container.scrollLeft += CELL_W; break;
      }
    }
});

window.addEventListener('keyup', e => { if (e.key === 'Control') canvas.style.cursor = 'default'; });

canvas.addEventListener('contextmenu', e => e.preventDefault());

let isPanning = false;
let panStartX, panStartY;
let panStartScrollLeft, panStartScrollTop;
let isDrawing = false;
let isDragging = false;
let startX = 0, startY = 0;
const DRAG_THRESHOLD = 3;
let isCtrlDrawing = false; 
let lastMouseX = 0, lastMouseY = 0;

function getCornerAt(mx, my, scrollLeft, scrollTop) {
  const step = Math.floor((mx + scrollLeft) / CELL_W);
  // FIX: Add scrollTop to calculation
  const pitch = Math.floor((my + scrollTop) / CELL_H); 
  
  if (step < 0 || step >= notes.length || pitch < 0 || pitch >= PITCHES.length) return null;
  
  const relX = (mx + scrollLeft) - step * CELL_W;
  // FIX: Add scrollTop to calculation
  const relY = (my + scrollTop) - pitch * CELL_H; 
  
  const left = relX < CELL_W / 2;
  const top = relY < CELL_H / 2;
  const instIdx = (top ? 0 : 2) + (left ? 0 : 1);
  
  const mask = notes[step][pitch];
  const isInst = (mask & (1 << instIdx)) !== 0;
  
  if (isInst) {
    return { step, pitch, instIdx };
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scrollLeft = container.scrollLeft;
  const scrollTop = container.scrollTop; // GET SCROLL TOP

  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  
  // PASS scrollTop to helper
  const clickedCorner = getCornerAt(mx, my, scrollLeft, scrollTop);

  if (e.button === 0 && e.ctrlKey) {
    if (e.shiftKey && clickedCorner) {
        const selectedIndex = selectedCorners.findIndex(c => 
          c.step === clickedCorner.step && 
          c.pitch === clickedCorner.pitch && 
          c.instIdx === clickedCorner.instIdx
        );
        if (selectedIndex !== -1) {
          selectedCorners.splice(selectedIndex, 1);
          redrawAll();
        }
        return;
    }
    
    if (clickedCorner) {
      const isSelected = selectedCorners.some(c => 
        c.step === clickedCorner.step && 
        c.pitch === clickedCorner.pitch && 
        c.instIdx === clickedCorner.instIdx
      );

      if (isSelected) {
        isDraggingSelection = true; 
        dragStart.x = mx; 
        dragStart.y = my;
      } else {
        selectedCorners.push(clickedCorner);
        redrawAll();
      }
      return; 
    }
    
    isSelecting = true;
    // Store absolute coordinates (adding scrollTop)
    selectionRect.x1 = mx + scrollLeft;
    selectionRect.y1 = my + scrollTop; // FIX
    selectionRect.x2 = mx + scrollLeft;
    selectionRect.y2 = my + scrollTop; // FIX
    selectedCorners = [];
    return;
  }

  if (e.button === 2) { 
    if (!e.ctrlKey) return;
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartScrollLeft = container.scrollLeft;
    panStartScrollTop = container.scrollTop;
    canvas.style.cursor = 'grabbing';
  } else if (e.button === 0) { 
    if (selectedCorners.length > 0) {
      selectedCorners = [];
      redrawAll();
    }
    
    isDrawing = true;
    isDragging = false;
    isCtrlDrawing = e.ctrlKey; 
    startX = mx;
    startY = my;
  }
});

window.addEventListener('mousemove', e => {
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  
  if (isPanning) {
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    container.scrollLeft = panStartScrollLeft - dx;
    container.scrollTop = panStartScrollTop - dy;
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scrollLeft = container.scrollLeft;
  const scrollTop = container.scrollTop; 

  if (isSelecting) {
    selectionRect.x2 = mx + scrollLeft;
    selectionRect.y2 = my + scrollTop; 
    redrawAll();
    return;
  }

  if (isDraggingSelection) {
    dragOffset.x = mx - dragStart.x;
    dragOffset.y = my - dragStart.y;
    
    // --- NEW: Check if hovering over Clear Button ---
    const clearBtn = document.getElementById('clearBtn');
    const btnRect = clearBtn.getBoundingClientRect();
    if (lastMouseX >= btnRect.left && lastMouseX <= btnRect.right &&
        lastMouseY >= btnRect.top && lastMouseY <= btnRect.bottom) {
      canvas.style.cursor = 'not-allowed'; // Indicate deletion
    } else {
      canvas.style.cursor = 'default';
    }
    // ----------------------------------------------

    redrawAll();
    return;
  }

  // Hover Logic
  const s = Math.floor((mx + scrollLeft) / CELL_W);
  const p = Math.floor((my + scrollTop) / CELL_H);
  
  if (s !== hoverStep || p !== hoverPitch) {
    hoverStep = s;
    hoverPitch = p;
    if (!isDrawing) redrawAll(); 
  }
  
  if (!isDrawing) return;
  
  const distX = Math.abs(mx - startX);
  const distY = Math.abs(my - startY);
  if (!isDragging && (distX > DRAG_THRESHOLD || distY > DRAG_THRESHOLD)) isDragging = true;
  if (isDragging) {
    toggleNoteAt(mx, my, scrollLeft, scrollTop, isCtrlDrawing);
    startX = mx;
  }
});

window.addEventListener('mouseup', e => {
  const scrollLeft = container.scrollLeft;
  const scrollTop = container.scrollTop; 

  // --- FIX: Box Selection Logic ---
  if (isSelecting) {
    isSelecting = false;
    
    // 1. Normalize the selection rectangle to absolute pixel coordinates
    const x1 = Math.min(selectionRect.x1, selectionRect.x2);
    const x2 = Math.max(selectionRect.x1, selectionRect.x2);
    const y1 = Math.min(selectionRect.y1, selectionRect.y2);
    const y2 = Math.max(selectionRect.y1, selectionRect.y2);
    
    // 2. Convert pixel bounds to grid bounds (Steps and Pitches)
    const startStep = Math.max(0, Math.floor(x1 / CELL_W));
    const endStep = Math.min(notes.length - 1, Math.floor(x2 / CELL_W));
    const startPitch = Math.max(0, Math.floor(y1 / CELL_H));
    const endPitch = Math.min(PITCHES.length - 1, Math.floor(y2 / CELL_H));
    
    // 3. Iterate through the grid cells within the selection
    for (let step = startStep; step <= endStep; step++) {
      for (let pitch = startPitch; pitch <= endPitch; pitch++) {
        const mask = notes[step][pitch];
        if (mask === 0) continue;
        
        const cellX = step * CELL_W;
        const cellY = pitch * CELL_H;
        const w2 = CELL_W / 2;
        const h2 = CELL_H / 2;
        
        // Check each of the 4 instrument quadrants for intersection
        if (mask & 1) {
          if (x2 > cellX && x1 < cellX + w2 && y2 > cellY && y1 < cellY + h2) {
            selectedCorners.push({ step, pitch, instIdx: 0 });
          }
        }
        if (mask & 2) {
          if (x2 > cellX + w2 && x1 < cellX + CELL_W && y2 > cellY && y1 < cellY + h2) {
            selectedCorners.push({ step, pitch, instIdx: 1 });
          }
        }
        if (mask & 4) {
          if (x2 > cellX && x1 < cellX + w2 && y2 > cellY + h2 && y1 < cellY + CELL_H) {
            selectedCorners.push({ step, pitch, instIdx: 2 });
          }
        }
        if (mask & 8) {
          if (x2 > cellX + w2 && x1 < cellX + CELL_W && y2 > cellY + h2 && y1 < cellY + CELL_H) {
            selectedCorners.push({ step, pitch, instIdx: 3 });
          }
        }
      }
    }
    
    redrawAll();
    return;
  }

  if (isDraggingSelection) {
    // --- NEW: Check for Drop on "Clear" Button ---
    const clearBtn = document.getElementById('clearBtn');
    const rect = clearBtn.getBoundingClientRect();
    const isOverClear = (lastMouseX >= rect.left && lastMouseX <= rect.right &&
                         lastMouseY >= rect.top && lastMouseY <= rect.bottom);

    if (isOverClear) {
        // Dropped on Clear -> Delete Selected Notes
        deleteSelectedNotes();
    } else {
        // Standard Move Logic
        const dStep = Math.round(dragOffset.x / CELL_W);
        const dPitch = Math.round(dragOffset.y / CELL_H);

        if (dStep !== 0 || dPitch !== 0) {
           moveSelection(dStep, dPitch);
        }
    }
    // ---------------------------------------------

    isDraggingSelection = false;
    dragOffset.x = 0; 
    dragOffset.y = 0;
    canvas.style.cursor = 'default'; 
    return;
  }

  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'default';
  }
  
  if (isDrawing) {
    if (!isDragging) {
      const rect = canvas.getBoundingClientRect();
      const mx = lastMouseX - rect.left;
      const my = lastMouseY - rect.top;
      toggleNoteAt(mx, my, scrollLeft, scrollTop, isCtrlDrawing);
    }
    isDrawing = false;
    isDragging = false;
    isCtrlDrawing = false;
    startX = startY = 0;
  }
});

let lastTouchCenter = null;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    toggleNoteAt(touch.clientX - rect.left, touch.clientY - rect.top, false); 
  } else if (e.touches.length === 2) {
    lastTouchCenter = getTouchCenter(e.touches);
  }
  e.preventDefault(); 
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    toggleNoteAt(touch.clientX - rect.left, touch.clientY - rect.top, false);
  } else if (e.touches.length === 2 && lastTouchCenter) {
    const newCenter = getTouchCenter(e.touches);
    const dx = newCenter.x - lastTouchCenter.x;
    const dy = newCenter.y - lastTouchCenter.y;
    container.scrollLeft -= dx;
    container.scrollTop -= dy;
    lastTouchCenter = newCenter;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastTouchCenter = null;
});

function getTouchCenter(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2
  };
}

const volumeBtn = document.getElementById('volumeBtn');
const volumePopup = document.getElementById('volumeSliderPopup');

if (volumeBtn && volumePopup && volumeSlider) {
    // 1. Toggle Popup Visibility
    volumeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isVisible = volumePopup.style.display === 'block';
        volumePopup.style.display = isVisible ? 'none' : 'block';
    });

    // 2. Close on outside click
    window.addEventListener('click', (e) => {
        if (!volumePopup.contains(e.target) && e.target !== volumeBtn) {
            volumePopup.style.display = 'none';
        }
    });

    // 3. Handle Slider Change
    volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value) / 100;
        currentVolume = val;

        // Update the global masterGain (used by chunked playback)
        if (masterGain) {
            masterGain.gain.setValueAtTime(val, masterGain.context.currentTime);
        }

        // Update any style instances that have been initialized (live preview)
        Object.keys(styleCache).forEach(key => {
            const style = styleCache[key];
            if (style.masterGain) {
                style.masterGain.gain.setValueAtTime(val * style.volume, style.audioContext.currentTime);
            }
        });
    });
}

/* -------------------------------------------------
   AUDIO UTILS
   ------------------------------------------------- */
let audioCtx = null; 
let playSource = null; 

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

function pitchToMidi(idx) {
  // PITCHES[0] is B7 (MIDI 107), PITCHES[last] is C1 (MIDI 24)
  // Formula: Highest MIDI (107) - index
  return 107 - idx; 
}

function scheduleNote(ctx, start, dur, pitchIdx, instIdx) {
  start = Math.max(0, start);
  if (dur <= 0) return;

  const freq = midiToFreq(pitchToMidi(pitchIdx));
  const setting = instrumentSettings[instIdx];
  
  if (setting.waveType === 'mute') return;

  const style = getStyle(setting.waveType);
  if (!style) return;

  // Get the instrument chain. PASS 'start' time.
  const instResult = style.createOscillator(ctx, freq, setting, start);
  if (!instResult) return;

  let gainNode = ctx.createGain();
  
  // --- CONNECTION LOGIC ---
  
  // Case A: Complex Instrument (Has an outputNode like filters, envelopes)
  if (instResult.outputNode) {
    instResult.outputNode.connect(gainNode);

    if (instResult.oscillators) {
      instResult.oscillators.forEach(osc => {
        osc.start(start);
        osc.stop(start + dur + 0.2); 
      });
    }
  } 
  // Case B: Simple Oscillator
  else if (instResult.oscillators) {
      instResult.oscillators.forEach(osc => {
          osc.connect(gainNode);
          osc.start(start);
          osc.stop(start + dur + 0.2);
      });
  }
  // Case C: Legacy/Basic Raw Oscillator
  else {
    const osc = instResult;
    osc.connect(gainNode);
    osc.start(start);
    osc.stop(start + dur + 0.2);
  }

  // --- VOLUME: Connect to masterGain if this is the real playback context ---
  if (ctx === audioCtx && masterGain) {
    gainNode.connect(masterGain);
  } else {
    gainNode.connect(ctx.destination);
  }

  // --- ENVELOPE LOGIC ---

  if (style.percussive) {
      gainNode.gain.setValueAtTime(1.0, start); 
  } else {
      gainNode.gain.setValueAtTime(0, start);
      gainNode.gain.linearRampToValueAtTime(0.2, start + 0.01);
      
      const sustainStart = start + 0.01;
      const sustainEnd = start + dur - 0.05;
      
      if (sustainEnd > sustainStart) {
        gainNode.gain.setValueAtTime(0.2, sustainStart);
        gainNode.gain.linearRampToValueAtTime(0.2, sustainEnd);
        gainNode.gain.exponentialRampToValueAtTime(0.001, start + dur);
      } else {
        gainNode.gain.exponentialRampToValueAtTime(0.001, start + dur);
      }
  }
}startPlayback

/* -------------------------------------------------
   LABEL CLICK (Uses Red Instrument 0 & Existing Silence)
   ------------------------------------------------- */
   
function playNoteFromLabel(pitchIndex) {
  // 1. Get Red Instrument (Index 0) Settings
  const settings = instrumentSettings[0];
  if (settings.waveType === 'mute' || settings.isDrum) return;

  const style = getStyle(settings.waveType);
  const freq = midiToFreq(pitchToMidi(pitchIndex));

  // 2. Ensure Context is running (User Gesture requirement)
  const ctx = style.getContext();
  if (ctx.state === 'suspended') ctx.resume();
  
  // 3. Ensure Volume is synced
  style.setVolume(currentVolume);

  // 4. Play
  // FIX: Create a temporary state object that forces 'hold' to true
  // This ensures the note sustains regardless of the saved instrument setting
  const playState = { ...settings, hold: true };
  style.start(freq, playState);
}

function stopNoteFromLabel() {
  // Use the Red Instrument's style to stop
  const settings = instrumentSettings[0];
  const style = getStyle(settings.waveType);
  if (style) style.stop();
}

/* -------------------------------------------------
   DECAY & TRUE END CALCULATION
   ------------------------------------------------- */

function getNoteDecay(instIdx) {
  const setting = instrumentSettings[instIdx];
  if (!setting || setting.waveType === 'mute') return 0;
  
  if (setting.decay !== undefined && setting.decay > 0) return setting.decay;
  if (setting.release !== undefined && setting.release > 0) return setting.release;
  
  return 0.2;
}

function getTrueEndTime() {
  const lastStep = findLastStep();
  if (lastStep === -1) return 0;
  
  let maxEndTime = 0;
  const maxPossibleDecay = 12;
  const cutoffStep = Math.max(0, Math.floor(lastStep + 1 - maxPossibleDecay / stepSec));
  
  for (let step = lastStep; step >= cutoffStep; step--) {
    if (!notes[step]) continue;
    for (let pitch = 0; pitch < PITCHES.length; pitch++) {
      const mask = notes[step][pitch];
      if (!mask) continue;
      for (let i = 0; i < 4; i++) {
        if (mask & (1 << i)) {
          const noteStart = step * stepSec;
          const decay = getNoteDecay(i);
          const endTime = noteStart + decay;
          if (endTime > maxEndTime) {
            maxEndTime = endTime;
          }
        }
      }
    }
  }
  
  const lastStepEnd = (lastStep + 1) * stepSec;
  return Math.max(maxEndTime, lastStepEnd + 0.5);
}

function calculateChunkTail(chunkIndex) {
  const chunkEndBeat = (chunkIndex + 1) * CHUNK_BEATS;
  const chunkEndTime = chunkEndBeat * (60 / TEMPO);
  const trueEnd = playbackTrueEnd > 0 ? playbackTrueEnd : getTrueEndTime();
  
  if (chunkEndTime < trueEnd) {
    return Math.max(0, trueEnd - chunkEndTime);
  }
  return 0;
}

/* -------------------------------------------------
   AUDIO RENDERING (Chunked & Full)
   ------------------------------------------------- */

function findLastStep() {
  // Use the actual array length, not the STEPS variable, 
  // in case of slight desync or pending updates.
  const limit = notes.length;
  
  // Iterate backwards from the end of the array
  for (let step = limit - 1; step >= 0; step--) {
    // Check if the step exists and has data
    if (notes[step] && notes[step].some(val => val > 0)) {
      return step;
    }
  }
  return -1; // Grid is empty
}

// Used for Playback (streaming chunks)
async function renderChunk(startBeat, numBeats, extraTailSec = 0) {
  const startStep = startBeat * SUBDIV;
  const endBeat = startBeat + numBeats;
  const endStep = Math.min(endBeat * SUBDIV, notes.length);
  
  const baseDuration = ((endStep - startStep) / SUBDIV) * (60 / TEMPO);
  const duration = baseDuration + extraTailSec;
  if (duration <= 0) return null;

  const sampleRate = 44100;
  const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);

  if (startStep > 0) {
    for (let pitch = 0; pitch < PITCHES.length; pitch++) {
      if (!notes[startStep - 1]) continue;
      const prevMask = notes[startStep - 1][pitch];
      if (!prevMask) continue;

      for (let i = 0; i < 4; i++) {
        const bit = 1 << i;
        const setting = instrumentSettings[i];
        
        if (!(prevMask & bit)) continue;

        const style = getStyle(setting.waveType);
        const isPercussive = style && (style.percussive || style.isDrum);
        
        if (isPercussive && !setting.hold) continue;

        if (setting.hold) {
          if (!notes[startStep]) continue;
          const currMask = notes[startStep][pitch];
          if (currMask & bit) {
            let length = 0;
            for (let k = startStep; k < endStep; k++) {
              if (notes[k] && (notes[k][pitch] & bit)) length++;
              else break;
            }
            if (length > 0) {
              scheduleNote(offlineCtx, 0, length * stepSec, pitch, i);
            }
          }
        }
      }
    }
  }

  for (let step = startStep; step < endStep; step++) {
    if (!notes[step]) continue;

    const stepStart = (step - startStep) * stepSec;
    
    for (let pitch = 0; pitch < PITCHES.length; pitch++) {
      const currentMask = notes[step][pitch];
      if (!currentMask) continue;
      
      const prevMask = (step > 0 && notes[step - 1]) ? notes[step - 1][pitch] : 0;

      for (let i = 0; i < 4; i++) {
        const bit = 1 << i;
        if (currentMask & bit) {
          const setting = instrumentSettings[i];
          const style = getStyle(setting.waveType);
          const isPercussive = style && (style.percussive || style.isDrum);

          if (!isPercussive && setting.hold && (prevMask & bit)) {
            continue; 
          }

          let noteDuration;
          
          if (isPercussive) {
             noteDuration = stepSec * 0.9; 
          } else {
             if (setting.hold) {
                let length = 1;
                for (let k = step + 1; k < endStep; k++) {
                   if (notes[k] && (notes[k][pitch] & bit)) length++;
                   else break;
                }
                noteDuration = length * stepSec;
             } else {
                noteDuration = stepSec * 0.9;
             }
          }
          
          scheduleNote(offlineCtx, stepStart, noteDuration, pitch, i);
        }
      }
    }
  }

  return await offlineCtx.startRendering();
}

// Used for Export (render entire song at once)
async function renderSong() {
  const lastStep = findLastStep();
  if (lastStep === -1) return null;
  
  const trueEnd = getTrueEndTime();
  const duration = trueEnd + 0.2;
  const sampleRate = 44100;
  const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);
  
  const totalSteps = lastStep + 1;
  
  for (let step = 0; step < totalSteps; step++) {
    const stepStart = step * stepSec;
    for (let pitch = 0; pitch < PITCHES.length; pitch++) {
      const currentMask = notes[step][pitch];
      if (!currentMask) continue;
      const prevMask = (step > 0) ? notes[step - 1][pitch] : 0;
      for (let i = 0; i < 4; i++) {
        const bit = 1 << i;
        if (currentMask & bit) {
          const setting = instrumentSettings[i];
          const style = getStyle(setting.waveType);
          const isPercussive = style && (style.percussive || style.isDrum);

          if (!isPercussive && setting.hold && (prevMask & bit)) continue;

          let noteDuration;
          if (isPercussive) {
             noteDuration = stepSec * 0.9;
          } else {
             if (setting.hold) {
                let length = 1;
                for (let k = step + 1; k < totalSteps; k++) {
                   if (notes[k][pitch] & bit) length++; else break;
                }
                noteDuration = length * stepSec;
             } else {
                noteDuration = stepSec * 0.9;
             }
          }

          scheduleNote(offlineCtx, stepStart, noteDuration, pitch, i);
        }
      }
    }
  }
  return await offlineCtx.startRendering();
}

<script>
/* -------------------------------------------------
   INSTRUMENT STYLE DICTIONARY (Atomic)
   ------------------------------------------------- */
const STYLE = {};

// Base class
class InstrumentStyle {
  constructor(name, value) {
    this.name = name;
    this.value = value;
    this.audioContext = null; // Each style handles its own context
    this.masterGain = null;   // Each style handles its own volume
    this.volume = 1.0; // Default volume multiplier
    this.isDrum = false; // Flag for scheduler logic
  }
  
  // 1. STATE: Defines what data this instrument needs to save.
  createDefaultState() {
    return {};
  }

  // 2. UI: Creates controls.
  createControls(container, state, audioContext) {
    container.innerHTML = '';
  }

  // 3. SAVE: Reads UI inputs and writes to state.
  saveSettings(state) {}

  // 4. AUDIO CONTEXT MANAGEMENT
  getContext() {
    if (!this.audioContext) {
      this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.audioContext.createGain();
      this.masterGain.connect(this.audioContext.destination);
    }
    return this.audioContext;
  }

  // 5. VOLUME CONTROL
  setVolume(value) {
    if (this.masterGain) {
      this.masterGain.gain.value = value * this.volume;
    }
  }

  // 6. START (Playback) - Implemented by subclasses
  start(freq, state) {
    // Default: do nothing. Subclasses override this.
  }

  // 7. STOP (Playback) - Implemented by subclasses
  stop() {
    // Default: do nothing. Subclasses override this.
  }

  // 8. RENDERER (Used by Export/Chunk system)
  // UPDATED: Added startTime parameter to fix the "plays once" bug
  createOscillator(ctx, freq, state, startTime = 0) {
    // Default implementation returns null. 
    // Subclasses implement this for the OfflineAudioContext renderer.
    return null;
  }

  // --- NEW DRUM HELPER METHODS ---

  // Helper to create a noise buffer (shared by Hi-hat, Cymbal, Snare)
  getNoiseBuffer(ctx) {
    // Cache buffer on context to avoid recreation
    if (!ctx._noiseBuffer) {
      const bufferSize = ctx.sampleRate * 0.5;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      ctx._noiseBuffer = buffer;
    }
    return ctx._noiseBuffer;
  }

  // Helper for "Metallic" noise (6 oscillators for inharmonic spectrum)
  createMetallicSource(ctx) {
    const fundamental = 40; 
    const ratios = [1, 1.342, 1.231, 1.653, 1.952, 2.152]; // Inharmonic ratios
    const gains = [1.0, 0.8, 0.6, 0.5, 0.4, 0.3];
    
    const oscillators = ratios.map((ratio, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = fundamental * ratio;
      
      const gain = ctx.createGain();
      gain.gain.value = gains[i];
      
      osc.connect(gain);
      return { osc, gain };
    });
    
    const output = ctx.createGain();
    oscillators.forEach(o => o.gain.connect(output));
    
    return { oscillators: oscillators.map(o => o.osc), output };
  }
}

STYLE.mute = class extends InstrumentStyle {

// 2. Sine
STYLE.sine = class extends InstrumentStyle {
  constructor() { super("Sine", "sine"); }
  
  createDefaultState() { return { hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold"> Hold (Legato)</label>
      </div>`;
    const chk = document.getElementById('ctrl_hold');
    if(chk) chk.checked = !!state.hold;
  }

  saveSettings(state) {
    const chk = document.getElementById('ctrl_hold');
    if(chk) state.hold = chk.checked;
  }

  start(freq, state) {
    this.stop(); // Stop previous note
    const ctx = this.getContext();
    
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, ctx.currentTime);
    env.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.01);

    osc.connect(env);
    env.connect(this.masterGain);
    
    osc.start();
    this.activeOsc = osc;
    this.activeEnv = env;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if (ctx) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          this.activeOsc.stop(ctx.currentTime + 0.11);
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    return osc;
  }
};

    this.activeEnv = env;

  stop() {

STYLE.snes_epiano = class extends InstrumentStyle {
  constructor() { super("SNES E.Piano", "snes_epiano"); }
  createDefaultState() { return { waveType: 'snes_epiano', brightness: 3000, decay: 0.2, sustain: 0.3, hold: false }; }
  getStyleSelectorValue() { return "snes_epiano"; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Brightness: <input type="range" id="ctrl_bright" min="500" max="8000" value="${state.brightness}"></label>
      </div>
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.01" max="1" step="0.01" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    state.waveType = 'snes_epiano';
    const el = document.getElementById('ctrl_bright');
    const decEl = document.getElementById('ctrl_decay');
    const holdChk = document.getElementById('ctrl_hold');
    if(el) state.brightness = parseFloat(el.value);
    if(decEl) state.decay = parseFloat(decEl.value);
    if(holdChk) state.hold = holdChk.checked;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.brightness || 3000;
    
    const distortion = ctx.createWaveShaper();
    distortion.curve = this.makeDistortionCurve(20);

    // FIX: Boosted from 1.2 to 5.0 to compensate for scheduleNote's 0.2 wrapper
    const gainBoost = ctx.createGain();
    gainBoost.gain.value = 5.0; 

    const envelope = ctx.createGain();
    const now = ctx.currentTime;
    const attack = 0.01;
    const decay = state.decay || 0.2;
    const sustain = state.sustain || 0.3;
    
    envelope.gain.setValueAtTime(0, now);
    envelope.gain.linearRampToValueAtTime(0.8, now + attack);
    envelope.gain.exponentialRampToValueAtTime(sustain, now + attack + decay);

    osc.connect(filter);
    filter.connect(distortion);
    distortion.connect(gainBoost);
    gainBoost.connect(envelope);
    envelope.connect(this.masterGain);

    osc.start();
    this.activeOsc = osc;
    this.activeEnv = envelope; // FIX: Store for proper stop
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if (ctx && this.activeEnv) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          this.activeOsc.stop(ctx.currentTime + 0.11);
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  makeDistortionCurve(amount) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; ++i) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.brightness || 3000;
    
    const distortion = ctx.createWaveShaper();
    distortion.curve = this.makeDistortionCurve(20);

    // FIX: Same boost for renderer
    const gainBoost = ctx.createGain();
    gainBoost.gain.value = 5.0;

    const envelope = ctx.createGain();
    const attack = 0.01;
    const decay = state.decay || 0.2;
    const sustain = state.sustain || 0.3;
    
    envelope.gain.setValueAtTime(0, startTime);
    envelope.gain.linearRampToValueAtTime(0.8, startTime + attack);
    envelope.gain.exponentialRampToValueAtTime(sustain, startTime + attack + decay);

    osc.connect(filter);
    filter.connect(distortion);
    distortion.connect(gainBoost);
    gainBoost.connect(envelope);

    return { oscillators: [osc], outputNode: envelope, hold: state.hold };
  }
};

STYLE.snes_strings = class extends InstrumentStyle {
  constructor() { 
    super("SNES Strings", "snes_strings"); 
  }
  
  createDefaultState() { return { waveType: 'snes_strings', attack: 0.1, release: 0.3, hold: false }; }
  getStyleSelectorValue() { return "snes_strings"; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Attack: <input type="range" id="ctrl_attack" min="0.01" max="0.5" step="0.01" value="${state.attack}"></label>
      </div>
      <div class="form-group">
        <label>Release: <input type="range" id="ctrl_release" min="0.05" max="1" step="0.01" value="${state.release}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    state.waveType = 'snes_strings';
    const atkEl = document.getElementById('ctrl_attack');
    const relEl = document.getElementById('ctrl_release');
    const holdChk = document.getElementById('ctrl_hold');
    if(atkEl) state.attack = parseFloat(atkEl.value);
    if(relEl) state.release = parseFloat(relEl.value);
    if(holdChk) state.hold = holdChk.checked;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2000;

    const envelope = ctx.createGain();
    const now = ctx.currentTime;
    const attack = state.attack || 0.1;
    const release = state.release || 0.3;

    envelope.gain.cancelScheduledValues(now);
    envelope.gain.setValueAtTime(0, now);
    envelope.gain.linearRampToValueAtTime(0.8, now + attack);

    if (state.hold) {
      // Hold mode: sustain at peak, don't auto-release
    } else {
      // Stab mode: auto-release after attack+release time
      envelope.gain.exponentialRampToValueAtTime(0.001, now + attack + release);
    }

    osc.connect(filter);
    filter.connect(envelope);
    envelope.connect(this.masterGain);

    osc.start(now);

    if (!state.hold) {
      osc.stop(now + attack + release + 0.1);
    }

    this.activeOsc = osc;
    this.activeEnv = envelope;
    this.savedState = state;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if (ctx && this.activeEnv) {
          const release = (this.savedState && this.savedState.release) ? this.savedState.release : 0.3;
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + release);
          this.activeOsc.stop(ctx.currentTime + release + 0.1);
        } else {
          this.activeOsc.stop();
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2000;

    const envelope = ctx.createGain();
    const attack = state.attack || 0.1;
    const release = state.release || 0.3;

    envelope.gain.setValueAtTime(0, startTime);
    envelope.gain.linearRampToValueAtTime(0.8, startTime + attack);

    if (state.hold) {
      // Hold mode: sustain at peak
    } else {
      // Stab mode: use configured release
      envelope.gain.exponentialRampToValueAtTime(0.001, startTime + attack + release);
    }

    osc.connect(filter);
    filter.connect(envelope);

    return { oscillators: [osc], outputNode: envelope, hold: state.hold };
  }
};

STYLE.gb_wave = class extends InstrumentStyle {
  constructor() { super("Gameboy Wave", "gb_wave"); }
  createDefaultState() { return { hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    const chk = document.getElementById('ctrl_hold');
    if(chk) state.hold = chk.checked;
  }

  getGameBoyWaveform() {
    const real = new Float32Array(32);
    for (let i = 0; i < 32; i++) {
      real[i] = Math.sin((i / 32) * Math.PI * 2) * 0.8; 
      if (i % 4 === 0) real[i] = Math.round(real[i] * 4) / 4;
    }
    return real;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    
    const wave = ctx.createPeriodicWave(this.getGameBoyWaveform(), new Float32Array(32));
    const osc = ctx.createOscillator();
    osc.setPeriodicWave(wave);
    osc.frequency.value = freq;

    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0.2, now);

    // FIX: If hold is off, automatically fade out and stop the oscillator
    if (!state.hold) {
      env.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.stop(now + 0.11);
    }

    osc.connect(env);
    env.connect(this.masterGain);
    osc.start();
    this.activeOsc = osc;
    this.activeEnv = env;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
            this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
            this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
            this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            this.activeOsc.stop(ctx.currentTime + 0.11);
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const wave = ctx.createPeriodicWave(this.getGameBoyWaveform(), new Float32Array(32));
    const osc = ctx.createOscillator();
    osc.setPeriodicWave(wave);
    osc.frequency.value = freq;
    return { oscillators: [osc], hold: state.hold };
  }
};

STYLE.gb_noise = class extends InstrumentStyle {
  constructor() { super("Gameboy Noise", "gb_noise"); }
  createDefaultState() { return { hold: false, pitch: 1000 }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Pitch (Color): <input type="range" id="ctrl_pitch" min="100" max="5000" value="${state.pitch}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    const chk = document.getElementById('ctrl_hold');
    const ptc = document.getElementById('ctrl_pitch');
    if(chk) state.hold = chk.checked;
    if(ptc) state.pitch = parseFloat(ptc.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    
    const bufferSize = ctx.sampleRate * 0.5;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;

    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = state.pitch || 1000;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.2, ctx.currentTime);
    
    // FIX: Stop automatically if not holding
    if (!state.hold) {
        env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        noise.stop(ctx.currentTime + 0.21);
    }

    noise.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);
    
    noise.start();
    this.activeOsc = noise;
    this.activeEnv = env;
    this.activeFilter = filter; // Store reference just in case
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
            this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
            this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
            this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            this.activeOsc.stop(ctx.currentTime + 0.11);
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const bufferSize = ctx.sampleRate * 0.5;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;

    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = state.pitch || 1000;

    noise.connect(filter);

    // Return the filter as outputNode so the renderer can connect it
    return { oscillators: [noise], outputNode: filter, hold: state.hold };
  }
};

    if(chk) state.hold = chk.checked;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    
    // Carrier

    carrier.type = 'sine';
    carrier.frequency.value = freq;

    // Modulator
    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = freq * (state.modRatio || 2);

    // Feedback loop for metallic sound
    const fbGain = ctx.createGain();
    fbGain.gain.value = (state.feedback || 30) * 0.02; // Scale 0-50 range
    
    // Modulation Index
    const modIndex = ctx.createGain();
    modIndex.gain.value = freq * 2; // Scale intensity with pitch

    // Routing: Modulator -> Feedback -> Modulator (Feedback loop)
    modulator.connect(fbGain);
    fbGain.connect(modulator.frequency);
    
    // Routing: Modulator -> Index -> Carrier Frequency
    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, ctx.currentTime);
    env.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);

    carrier.connect(env);
    env.connect(this.masterGain);

    carrier.start();
    modulator.start();

    this.activeOscs = [carrier, modulator];
  }

  stop() {
    if (this.activeOscs) {
      this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} });
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = freq;

    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = freq * (state.modRatio || 2);

    const fbGain = ctx.createGain();
    fbGain.gain.value = (state.feedback || 30) * 0.02;
    
    const modIndex = ctx.createGain();
    modIndex.gain.value = freq * 2;

    modulator.connect(fbGain);
    fbGain.connect(modulator.frequency);
    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    return { oscillators: [carrier, modulator], outputNode: carrier, hold: state.hold };
  }
};

// 17. Acoustic Guitar
STYLE.acoustic_guitar = class extends InstrumentStyle {
  constructor() { 
    super("Acoustic Guitar", "acoustic_guitar"); 
    // FIX: Removed this.percussive = true; so the scheduler allows legato
  }
  
  createDefaultState() { return { decay: 0.5, brightness: 1.5, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="2" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Brightness: <input type="range" id="ctrl_bright" min="0.5" max="4" step="0.1" value="${state.brightness}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const brEl = document.getElementById('ctrl_bright');
    const holdChk = document.getElementById('ctrl_hold');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(brEl) state.brightness = parseFloat(brEl.value);
    if(holdChk) state.hold = holdChk.checked;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 1;
    
    const now = ctx.currentTime;
    filter.frequency.setValueAtTime(freq * state.brightness * 4, now);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.4, now);

    if (!state.hold) {
      // Normal mode: Pluck and naturally decay
      filter.frequency.exponentialRampToValueAtTime(freq * state.brightness * 0.5, now + state.decay);
      env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);
      osc.stop(now + state.decay + 0.1);
    } else {
      // Hold mode: Sustain the brightness until stop() is called
      filter.frequency.exponentialRampToValueAtTime(freq * state.brightness * 2, now + 0.05);
    }

    osc.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);
    
    osc.start();
    this.activeOsc = osc;
    this.activeEnv = env;
    this.savedState = state;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if (ctx && this.activeEnv) {
          // Use decay time as the release tail when letting go
          const rel = (this.savedState && this.savedState.decay) ? this.savedState.decay : 0.5;
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + rel);
          this.activeOsc.stop(ctx.currentTime + rel + 0.1);
        } else {
          this.activeOsc.stop();
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 1;
    
    filter.frequency.setValueAtTime(freq * state.brightness * 4, startTime);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.4, startTime);

    if (!state.hold) {
      filter.frequency.exponentialRampToValueAtTime(freq * state.brightness * 0.5, startTime + state.decay);
      env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);
    } else {
      filter.frequency.exponentialRampToValueAtTime(freq * state.brightness * 2, startTime + 0.05);
    }

    osc.connect(filter);
    filter.connect(env);

    // FIX: Return state.hold instead of hardcoded false
    return { oscillators: [osc], outputNode: env, hold: state.hold };
  }
};

// 18. Electric Guitar (SNES Rock Style)
STYLE.electric_guitar = class extends InstrumentStyle {
  constructor() { super("Electric Guitar", "electric_guitar"); }
  createDefaultState() { return { drive: 25, tone: 2500, hold: false, thickness: 15 }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Drive: <input type="range" id="ctrl_drive" min="1" max="50" value="${state.drive}"></label>
      </div>
      <div class="form-group">
        <label>Tone: <input type="range" id="ctrl_tone" min="200" max="8000" value="${state.tone}"></label>
      </div>
      <div class="form-group">
        <label>Thickness (Detune): <input type="range" id="ctrl_thick" min="0" max="30" value="${state.thickness}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    const drvEl = document.getElementById('ctrl_drive');
    const toneEl = document.getElementById('ctrl_tone');
    const thickEl = document.getElementById('ctrl_thick');
    const chk = document.getElementById('ctrl_hold');
    if(drvEl) state.drive = parseFloat(drvEl.value);
    if(toneEl) state.tone = parseFloat(toneEl.value);
    if(thickEl) state.thickness = parseFloat(thickEl.value);
    if(chk) state.hold = chk.checked;
  }

  makeDistortionCurve(amount) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; ++i) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    
    // --- OSCILLATOR 1 (Center) ---
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = freq;

    // --- OSCILLATOR 2 (Detuned for "Thickness") ---
    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = freq;
    osc2.detune.value = state.thickness || 15; // Creates a chorus-like rock thickness

    // 1. Pre-EQ (Add bite)
    const preEq = ctx.createBiquadFilter();
    preEq.type = 'highshelf';
    preEq.frequency.value = 1000;
    preEq.gain.value = 6;

    // 2. Distortion (The Crunch)
    const distortion = ctx.createWaveShaper();
    distortion.curve = this.makeDistortionCurve(state.drive || 25);

    // 3. Post-EQ (Tone Control)
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.tone || 2500;

    // 4. Envelope (Punchy)
    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.7, now + 0.01); // Boosted volume
    
    if (!state.hold) {
      env.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    }

    // 5. Output Boost (Compensates for distortion volume loss)
    const outputGain = ctx.createGain();
    outputGain.gain.value = 1.5; // Make it loud!

    // Routing: Osc1 & Osc2 -> PreEq -> Distortion -> Filter -> Envelope -> Output -> Master
    osc1.connect(preEq);
    osc2.connect(preEq);
    preEq.connect(distortion);
    distortion.connect(filter);
    filter.connect(env);
    env.connect(outputGain);
    outputGain.connect(this.masterGain);

    osc1.start();
    osc2.start();
    this.activeOscs = [osc1, osc2];
    this.activeEnv = env;
  }

  stop() {
    if (this.activeOscs) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          this.activeOscs.forEach(o => o.stop(ctx.currentTime + 0.11));
        }
      } catch(e) {}
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = freq;

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = freq;
    osc2.detune.value = state.thickness || 15;

    const preEq = ctx.createBiquadFilter();
    preEq.type = 'highshelf';
    preEq.frequency.value = 1000;
    preEq.gain.value = 6;

    const distortion = ctx.createWaveShaper();
    distortion.curve = this.makeDistortionCurve(state.drive || 25);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.tone || 2500;
    
    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.7, now + 0.01); 

    const outputGain = ctx.createGain();
    outputGain.gain.value = 1.5;

    osc1.connect(preEq);
    osc2.connect(preEq);
    preEq.connect(distortion);
    distortion.connect(filter);
    filter.connect(env);
    env.connect(outputGain);

    return { oscillators: [osc1, osc2], outputNode: outputGain, hold: state.hold };
  }
};

STYLE.electric_guitar = class extends InstrumentStyle {
  constructor() { super("Electric Guitar", "electric_guitar"); }

      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  start(freq, state) {

    osc2.type = 'sawtooth';

    if (this.activeOscs) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          this.activeOscs.forEach(o => o.stop(ctx.currentTime + 0.11));
        }
      } catch(e) {}
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = freq;

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = freq;
    osc2.detune.value = state.thickness || 20;

    const preEq = ctx.createBiquadFilter();
    preEq.type = 'highshelf';
    preEq.frequency.value = 1000;
    preEq.gain.value = 6;

    const distortion = ctx.createWaveShaper();
    distortion.curve = this.makeDistortionCurve(state.drive || 35);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = freq * 8; 
    filter.Q.value = 1;
    
    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.8, now + 0.01);

    const outputGain = ctx.createGain();
    outputGain.gain.value = 3.0;

    osc1.connect(preEq);
    osc2.connect(preEq);
    preEq.connect(distortion);
    distortion.connect(filter);
    filter.connect(env);
    env.connect(outputGain);

    return { oscillators: [osc1, osc2], outputNode: outputGain, hold: state.hold };
  }
};

// 19. Bass Guitar
STYLE.bass_guitar = class extends InstrumentStyle {
  constructor() { 
    super("Bass Guitar", "bass_guitar"); 
  }
  
  createDefaultState() { return { decay: 0.4, filter: 800, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="1" step="0.05" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Filter: <input type="range" id="ctrl_filter" min="100" max="2000" value="${state.filter}"></label>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Legato)</label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const filEl = document.getElementById('ctrl_filter');
    const holdChk = document.getElementById('ctrl_hold');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(filEl) state.filter = parseFloat(filEl.value);
    if(holdChk) state.hold = holdChk.checked;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.filter || 800;
    filter.Q.value = 2; 

    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0.5, now);

    if (!state.hold) {
      // Normal mode: Pluck and decay naturally
      env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);
      osc.stop(now + state.decay + 0.1);
    }

    osc.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);

    osc.start();
    this.activeOsc = osc;
    this.activeEnv = env;
    this.savedState = state;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if (ctx && this.activeEnv) {
          // Smooth fade out using the decay slider as release time
          const rel = (this.savedState && this.savedState.decay) ? this.savedState.decay : 0.4;
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + rel);
          this.activeOsc.stop(ctx.currentTime + rel + 0.1);
        } else {
          this.activeOsc.stop();
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.filter || 800;
    filter.Q.value = 2;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.5, startTime);

    if (!state.hold) {
      env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);
    }

    osc.connect(filter);
    filter.connect(env);
    
    // FIX: Pass state.hold instead of hardcoded false
    return { oscillators: [osc], outputNode: env, hold: state.hold };
  }
};

// 22. Bell
STYLE.bell = class extends InstrumentStyle {
  constructor() { super("Bell", "bell"); }
  createDefaultState() { return { decay: 2.0, brightness: 1000, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.5" max="8" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Brightness: <input type="range" id="ctrl_bright" min="200" max="3000" value="${state.brightness}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const brEl = document.getElementById('ctrl_bright');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(brEl) state.brightness = parseFloat(brEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // --- Additive Synthesis for Inharmonic Partials ---
    // Ratios derived from physical bell modeling (approximate)
    const partials = [
      { ratio: 1.0,    gain: 1.0,   decay: 1.0 },   // Fundamental (Hum)
      { ratio: 2.4,    gain: 0.6,   decay: 0.9 },   // Minor Third (Prime)
      { ratio: 5.95,   gain: 0.4,   decay: 0.65 },  // Double Flattened Seventh (Tierce/Quint)
      { ratio: 8.2,    gain: 0.25,  decay: 0.45 },  // Upper partials (Nominal)
      { ratio: 11.7,   gain: 0.15,  decay: 0.3 }    // High metallic shimmer
    ];

    const masterEnv = ctx.createGain();
    masterEnv.gain.setValueAtTime(0.5, now);
    masterEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay);
    masterEnv.connect(this.masterGain);

    this.activeOscs = [];

    partials.forEach(p => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      // Calculate frequency with slight random detune for richness
      osc.frequency.value = freq * p.ratio * (1 + (Math.random() * 0.002 - 0.001));

      // Individual envelope for each partial to simulate decay complexity
      const env = ctx.createGain();
      // Brightness controls how much the high partials stand out
      const brightnessScale = (p.ratio > 4) ? (state.brightness / 1000) : 1.0;
      
      env.gain.setValueAtTime(p.gain * brightnessScale, now);
      env.gain.exponentialRampToValueAtTime(0.001, now + (state.decay * p.decay));

      osc.connect(env);
      env.connect(masterEnv);

      osc.start(now);
      osc.stop(now + state.decay + 0.1);
      
      this.activeOscs.push(osc);
    });

    this.activeEnv = masterEnv;
  }

  stop() {
    // Bell is percussive; ignore stop command to let it ring naturally
    this.activeOscs = null;
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const partials = [
      { ratio: 1.0,    gain: 1.0,   decay: 1.0 },
      { ratio: 2.4,    gain: 0.6,   decay: 0.9 },
      { ratio: 5.95,   gain: 0.4,   decay: 0.65 },
      { ratio: 8.2,    gain: 0.25,  decay: 0.45 },
      { ratio: 11.7,   gain: 0.15,  decay: 0.3 }
    ];

    const masterEnv = ctx.createGain();
    masterEnv.gain.setValueAtTime(0.5, startTime);
    masterEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    const oscs = [];

    partials.forEach(p => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq * p.ratio;

      const env = ctx.createGain();
      const brightnessScale = (p.ratio > 4) ? (state.brightness / 1000) : 1.0;
      
      env.gain.setValueAtTime(p.gain * brightnessScale, startTime);
      env.gain.exponentialRampToValueAtTime(0.001, startTime + (state.decay * p.decay));

      osc.connect(env);
      env.connect(masterEnv);
      oscs.push(osc);
    });

    return { oscillators: oscs, outputNode: masterEnv, hold: false };
  }
};

// 23. Gong (Tam-Tam)
STYLE.gong = class extends InstrumentStyle {
  constructor() { super("Gong", "gong"); }
  
  createDefaultState() { 
    return { decay: 4.0, wobble: 10, hold: false }; 
  }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="1.0" max="10.0" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Wobble (Shimmer): <input type="range" id="ctrl_wobble" min="0" max="30" value="${state.wobble}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const wobEl = document.getElementById('ctrl_wobble');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(wobEl) state.wobble = parseFloat(wobEl.value);
  }

  getNoiseBuffer(ctx) {
    if (!ctx._noiseBuffer) {
      const bufferSize = ctx.sampleRate * 2;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      ctx._noiseBuffer = buffer;
    }
    return ctx._noiseBuffer;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // 1. THE "THWACK" (Low-passed Noise)
    // This is the immediate impact sound.
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = freq * 2; // Keep it bassy
    noiseFilter.Q.value = 1;

    const noiseEnv = ctx.createGain();
    // Loud start, fast decay (the impact doesn't ring forever)
    noiseEnv.gain.setValueAtTime(1.0, now);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay * 0.3);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);
    noiseEnv.connect(this.masterGain);
    
    noise.start(now);
    noise.stop(now + state.decay + 0.1);

    // 2. THE "SHIMMER" (Wobbling Sine)
    // This simulates the metal vibrating back and forth.
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    // LFO creates the "wobble" (Vibrato)
    const lfo = ctx.createOscillator();
    lfo.frequency.value = state.wobble / 2 || 5; // Slow wobble
    
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = state.wobble || 10; // How deep the wobble is
    
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    const oscEnv = ctx.createGain();
    // Sharp attack, long release
    oscEnv.gain.setValueAtTime(0.5, now);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    osc.connect(oscEnv);
    oscEnv.connect(this.masterGain);

    osc.start(now);
    lfo.start(now);
    osc.stop(now + state.decay + 0.1);
    lfo.stop(now + state.decay + 0.1);

    this.activeOscs = [noise, osc, lfo];
  }

  stop() {
    if (this.activeOscs) {
      this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} });
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    // Noise Layer
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = freq * 2;
    
    const noiseEnv = ctx.createGain();
    noiseEnv.gain.setValueAtTime(1.0, startTime);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay * 0.3);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);

    // Shimmer Layer
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    const lfo = ctx.createOscillator();
    lfo.frequency.value = state.wobble / 2 || 5;
    
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = state.wobble || 10;
    
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0.5, startTime);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    osc.connect(oscEnv);

    // Sum
    const sum = ctx.createGain();
    noiseEnv.connect(sum);
    oscEnv.connect(sum);

    return { oscillators: [noise, osc, lfo], outputNode: sum, hold: false };
  }
};

  }

  start(freq, state) {

    const env = ctx.createGain();

    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.4, now + state.attack);

    osc.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);

    osc.start();
    lfo.start();

    this.activeOscs = [osc, lfo];
    this.activeEnv = env;
  }

  stop() {
    if (this.activeOscs) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          this.activeOscs.forEach(o => o.stop(ctx.currentTime + 0.11));
        }
      } catch(e) {}
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state) {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const lfo = ctx.createOscillator();
    lfo.frequency.value = 5.5;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = state.vibrato || 15;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = state.filter || 5000;

    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.4, now + state.attack);

    osc.connect(filter);
    filter.connect(env);

    // FIX: Return env
    return { oscillators: [osc, lfo], outputNode: env, hold: state.hold };
  }
};

// 27. Vibraphone (Metallic, Sustained with Tremolo)
STYLE.vibraphone = class extends InstrumentStyle {
  constructor() { 
    super("Vibraphone", "vibraphone"); 
  }
  
  createDefaultState() { 
    return { 
      decay: 1.5,       // Length of the ring
      tremolo: 6,       // Speed of the vibrato motor
      metal: 800,       // Metallic brightness (FM amount)
      hold: false 
    }; 
  }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.2" max="4.0" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Tremolo Speed: <input type="range" id="ctrl_tremolo" min="0" max="15" step="0.5" value="${state.tremolo}"></label>
      </div>
      <div class="form-group">
        <label>Metallic: <input type="range" id="ctrl_metal" min="100" max="2000" step="50" value="${state.metal}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const tremEl = document.getElementById('ctrl_tremolo');
    const metEl = document.getElementById('ctrl_metal');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(tremEl) state.tremolo = parseFloat(tremEl.value);
    if(metEl) state.metal = parseFloat(metEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // 1. Carrier (The fundamental pitch)
    const carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = freq;

    // 2. Modulator (Creates the "Metal" sound)
    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    // Ratio of 3.5 creates a distinct metallic inharmonic texture
    modulator.frequency.value = freq * 3.5; 

    // Modulation Index (Brightness)
    const modIndex = ctx.createGain();
    modIndex.gain.value = state.metal || 800;

    // Connect Modulation: Modulator -> Index -> Carrier Frequency
    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    // 3. Tremolo (The "Vibe" motor)
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = state.tremolo || 6; // Default 6Hz

    const lfoDepth = ctx.createGain();
    lfoDepth.gain.value = 0.3; // 30% intensity

    // Connect LFO to a Master Gain node for amplitude modulation
    const tremoloGain = ctx.createGain();
    lfo.connect(lfoDepth);
    lfoDepth.connect(tremoloGain.gain);

    // 4. Main Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.7, now);
    // Vibraphones ring out for a long time
    env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    // Routing Chain
    carrier.connect(tremoloGain);
    tremoloGain.connect(env);
    env.connect(this.masterGain);

    // Start all oscillators
    carrier.start(now);
    modulator.start(now);
    lfo.start(now);

    // Stop after decay to clean up
    carrier.stop(now + state.decay + 0.1);
    modulator.stop(now + state.decay + 0.1);
    lfo.stop(now + state.decay + 0.1);

    this.activeOscs = [carrier, modulator, lfo];
  }

  stop() {
    if (this.activeOscs) {
      this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} });
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    // 1. Carrier
    const carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = freq;

    // 2. Modulator
    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = freq * 3.5;

    const modIndex = ctx.createGain();
    modIndex.gain.value = state.metal || 800;

    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    // 3. Tremolo
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = state.tremolo || 6;

    const lfoDepth = ctx.createGain();
    lfoDepth.gain.value = 0.3;

    const tremoloGain = ctx.createGain();
    lfo.connect(lfoDepth);
    lfoDepth.connect(tremoloGain.gain);
    
    // 4. Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.7, startTime);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    carrier.connect(tremoloGain);
    tremoloGain.connect(env);

    return { oscillators: [carrier, modulator, lfo], outputNode: env, hold: false };
  }
};

// 28. Xylophone (Soft, Wooden, Percussive via FM Synthesis)
STYLE.xylophone = class extends InstrumentStyle {
  constructor() { 
    super("Xylophone", "xylophone"); 
  }
  
  createDefaultState() { 
    // Brightness controls the FM amount (hardness of mallet)
    return { decay: 0.8, brightness: 800, hold: false }; 
  }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="2.0" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Hardness: <input type="range" id="ctrl_hardness" min="200" max="2000" value="${state.brightness}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const hardEl = document.getElementById('ctrl_hardness');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(hardEl) state.brightness = parseFloat(hardEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();

    // --- FM Synthesis Setup ---
    // Carrier: The pitch you hear.
    const carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = freq;

    // Modulator: Creates the "knock" and inharmonic overtones.
    // Ratio 4.0 creates a bright, metallic timbre common in xylophones.
    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = freq * 4.0; 

    // Modulation Index: Controls the brightness/hardness.
    const modIndex = ctx.createGain();
    modIndex.gain.value = state.brightness || 800;

    // Connect FM Chain: Modulator -> Index -> Carrier Frequency
    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    // --- Envelope (The "Soft" Attack) ---
    // Xylophones have a very fast attack, but we use setTargetAtTime 
    // to smooth it just enough to avoid a harsh digital click, simulating a felt mallet.
    const env = ctx.createGain();
    const now = ctx.currentTime;
    
    // Start at 0
    env.gain.setValueAtTime(0, now);
    // Ramp up extremely fast (0.01s) to peak
    env.gain.linearRampToValueAtTime(0.6, now + 0.01);
    // Decay naturally
    env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    // --- Filter (Air Absorption Simulation) ---
    // A gentle highpass removes low thumps. A lowpass removes harsh high fizz.
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2500; // Focus on the "wood" frequencies
    filter.Q.value = 0.5; // Gentle slope

    // Routing
    carrier.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);

    carrier.start(now);
    modulator.start(now);
    
    // Stop oscillators after decay to save resources
    carrier.stop(now + state.decay + 0.1);
    modulator.stop(now + state.decay + 0.1);

    this.activeOscs = [carrier, modulator];
  }

  stop() {
    if (this.activeOscs) {
      this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} });
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    // 1. Carrier
    const carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = freq;

    // 2. Modulator
    const modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = freq * 4.0; 

    // 3. Modulation Index
    const modIndex = ctx.createGain();
    modIndex.gain.value = state.brightness || 800;

    modulator.connect(modIndex);
    modIndex.connect(carrier.frequency);

    // 4. Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(0.6, startTime + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    // 5. Filter
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2500;
    filter.Q.value = 0.5;

    carrier.connect(filter);
    filter.connect(env);

    return { oscillators: [carrier, modulator], outputNode: env, hold: false };
  }
};

// 30. Kick Drum
STYLE.drum_kick = class extends InstrumentStyle {
  constructor() { super("Drum Kick", "drum_kick"); this.isDrum = true; }
  createDefaultState() { return { decay: 0.5, drive: 10, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="1.5" step="0.05" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Drive: <input type="range" id="ctrl_drive" min="1" max="50" value="${state.drive}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const drvEl = document.getElementById('ctrl_drive');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(drvEl) state.drive = parseFloat(drvEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // Map incoming frequency (pitch) to the Kick's "Base" pitch.
    // Low C2 (65Hz) -> Base 40Hz (Deep)
    // High C5 (523Hz) -> Base 120Hz (Tight/Punchy)
    const minBase = 35;
    const maxBase = 120;
    // Clamp frequency to a control range for calculation
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    const pitchRatio = (safeFreq - 65) / (600 - 65); // 0.0 to 1.0
    const basePitch = minBase + (pitchRatio * (maxBase - minBase));

    // 1. Sine Oscillator for the "Thump"
    const osc = ctx.createOscillator();
    // Pitch Drop: Start an octave higher, drop to base
    osc.frequency.setValueAtTime(basePitch * 2.5, now);
    osc.frequency.exponentialRampToValueAtTime(basePitch, now + 0.05);

    // 2. Drive (Distortion)
    const dist = ctx.createWaveShaper();
    dist.curve = this.makeDistortionCurve(state.drive || 10);

    // 3. Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(1, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    osc.connect(dist);
    dist.connect(env);
    env.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + state.decay + 0.1);
    this.activeOsc = osc;
  }

  makeDistortionCurve(amount) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; ++i) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  stop() {
    if (this.activeOsc) { try { this.activeOsc.stop(); } catch(e) {} this.activeOsc = null; }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const minBase = 35;
    const maxBase = 120;
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    const pitchRatio = (safeFreq - 65) / (600 - 65);
    const basePitch = minBase + (pitchRatio * (maxBase - minBase));

    const osc = ctx.createOscillator();
    osc.frequency.setValueAtTime(basePitch * 2.5, startTime);
    osc.frequency.exponentialRampToValueAtTime(basePitch, startTime + 0.05);

    const dist = ctx.createWaveShaper();
    dist.curve = this.makeDistortionCurve(state.drive || 10);

    const env = ctx.createGain();
    env.gain.setValueAtTime(1, startTime);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    osc.connect(dist);
    dist.connect(env);

    return { oscillators: [osc], outputNode: env, hold: false };
  }
};

// 31. Tom Drum
STYLE.drum_tom = class extends InstrumentStyle {
  constructor() { super("Drum Tom", "drum_tom"); this.isDrum = true; }
  createDefaultState() { return { decay: 0.35, drive: 5, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="1.5" step="0.05" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Drive: <input type="range" id="ctrl_drive" min="1" max="50" value="${state.drive}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const drvEl = document.getElementById('ctrl_drive');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(drvEl) state.drive = parseFloat(drvEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // Map incoming frequency to Tom "Base" pitch.
    // C2 (65Hz) -> Low Tom (80Hz)
    // C5 (523Hz) -> High Tom (400Hz)
    const minBase = 80;
    const maxBase = 400;
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    // Linear interpolation
    const pitchRatio = (safeFreq - 65) / (600 - 65); 
    const basePitch = minBase + (pitchRatio * (maxBase - minBase));

    // 1. Sine Oscillator for the "Body"
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    // Pitch Drop: Start higher, drop to base
    osc.frequency.setValueAtTime(basePitch * 1.6, now);
    osc.frequency.exponentialRampToValueAtTime(basePitch, now + 0.08);

    // 2. Drive (Distortion) - Same chain as Kick for consistency
    const dist = ctx.createWaveShaper();
    dist.curve = this.makeDistortionCurve(state.drive || 5);

    // 3. Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(1, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    osc.connect(dist);
    dist.connect(env);
    env.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + state.decay + 0.1);
    this.activeOsc = osc;
  }

  makeDistortionCurve(amount) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; ++i) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  stop() {
    if (this.activeOsc) { try { this.activeOsc.stop(); } catch(e) {} this.activeOsc = null; }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const minBase = 80;
    const maxBase = 400;
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    const pitchRatio = (safeFreq - 65) / (600 - 65);
    const basePitch = minBase + (pitchRatio * (maxBase - minBase));

    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(basePitch * 1.6, startTime);
    osc.frequency.exponentialRampToValueAtTime(basePitch, startTime + 0.08);

    const dist = ctx.createWaveShaper();
    dist.curve = this.makeDistortionCurve(state.drive || 5);

    const env = ctx.createGain();
    env.gain.setValueAtTime(1, startTime);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    osc.connect(dist);
    dist.connect(env);

    return { oscillators: [osc], outputNode: env, hold: false };
  }
};

// 32. Snare Drum
STYLE.drum_snare = class extends InstrumentStyle {
  constructor() { super("Drum Snare", "drum_snare"); this.isDrum = true; }
  createDefaultState() { return { decay: 0.2, snap: 0.6, hold: false }; }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="0.1" max="1.0" step="0.05" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Snap (Noise): <input type="range" id="ctrl_snap" min="0.0" max="1.0" step="0.1" value="${state.snap}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const snapEl = document.getElementById('ctrl_snap');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(snapEl) state.snap = parseFloat(snapEl.value);
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // Map frequency to Snare "Tone" (Body frequency)
    // Low C2 -> 100Hz (Loose, deep thump)
    // High C5 -> 400Hz (Tight, crisp crack)
    const minTone = 100;
    const maxTone = 400;
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    const pitchRatio = (safeFreq - 65) / (600 - 65);
    const tone = minTone + (pitchRatio * (maxTone - minTone));

    // 1. Body (Triangle Osc)
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(tone * 1.8, now); // Start slightly higher for impact
    osc.frequency.exponentialRampToValueAtTime(tone, now + 0.05);

    // 2. Noise (Snap)
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);
    
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    // Snap brightness tracks the tone slightly
    noiseFilter.frequency.value = tone * 4; 

    // 3. Envelopes
    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0.7, now);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    const noiseEnv = ctx.createGain();
    noiseEnv.gain.setValueAtTime(state.snap, now);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay * 0.8);

    // Mix
    const masterEnv = ctx.createGain();
    masterEnv.gain.setValueAtTime(1, now);
    masterEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay);
    
    osc.connect(oscEnv);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);

    oscEnv.connect(masterEnv);
    noiseEnv.connect(masterEnv);
    masterEnv.connect(this.masterGain);

    osc.start(now);
    noise.start(now);
    osc.stop(now + state.decay + 0.1);
    noise.stop(now + state.decay + 0.1);
    
    this.activeOscs = [osc, noise];
  }

  stop() {
    if (this.activeOscs) { this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} }); this.activeOscs = null; }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const minTone = 100;
    const maxTone = 400;
    const safeFreq = Math.max(65, Math.min(freq, 1000));
    const pitchRatio = (safeFreq - 65) / (600 - 65);
    const tone = minTone + (pitchRatio * (maxTone - minTone));

    // Body
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(tone * 1.8, startTime);
    osc.frequency.exponentialRampToValueAtTime(tone, startTime + 0.05);

    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0.7, startTime);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);
    osc.connect(oscEnv);

    // Noise
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);
    
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = tone * 4;

    const noiseEnv = ctx.createGain();
    noiseEnv.gain.setValueAtTime(state.snap, startTime);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay * 0.8);
    
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);

    // Sum
    const sum = ctx.createGain();
    oscEnv.connect(sum);
    noiseEnv.connect(sum);

    return { oscillators: [osc, noise], outputNode: sum, hold: false };
  }
};

STYLE.drum_hihat = class extends InstrumentStyle {
  constructor() { super("Drum Hi-Hat", "drum_hihat"); this.isDrum = true; }

    const now = ctx.currentTime;

    // 1. Noise Source
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    // 2. Pitch Mapping: Frequency -> Highpass Filter Cutoff
    // Map MIDI range to sensible "Hat" frequencies (approx 5kHz to 15kHz)
    // freq comes from the note pitch on the grid.
    const minFreq = 5000;
    const maxFreq = 15000;
    // Simple clamp to keep it in "Hat" territory

    filter.type = 'highpass';
    filter.frequency.value = cutoff;

    // 3. Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.8, now); // Boosted volume
    env.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    noise.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);

    noise.start(now);
    noise.stop(now + state.decay + 0.1);
    
    this.activeOscs = [noise];
  }

  stop() {
    if (this.activeOscs) { this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} }); this.activeOscs = null; }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    const minFreq = 5000;
    const maxFreq = 15000;
    const cutoff = Math.min(maxFreq, Math.max(minFreq, freq * 2));
    
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = cutoff;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.8, startTime);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    noise.connect(filter);
    filter.connect(env);

    return { oscillators: [noise], outputNode: env, hold: false };
  }
};

// 35. Rocket
STYLE.rocket = class extends InstrumentStyle {
  constructor() { super("Rocket", "rocket"); }
  
  createDefaultState() { 
    return { decay: 4.0, trash: 0.8, hold: false }; 
  }

  createControls(container, state, audioContext) {
    container.innerHTML = `
      <div class="form-group">
        <label>Decay: <input type="range" id="ctrl_decay" min="1.0" max="10.0" step="0.1" value="${state.decay}"></label>
      </div>
      <div class="form-group">
        <label>Metallic (Trash): <input type="range" id="ctrl_trash" min="0.0" max="1.0" step="0.05" value="${state.trash}"></label>
      </div>
    `;
  }

  saveSettings(state) {
    const decEl = document.getElementById('ctrl_decay');
    const trashEl = document.getElementById('ctrl_trash');
    if(decEl) state.decay = parseFloat(decEl.value);
    if(trashEl) state.trash = parseFloat(trashEl.value);
  }

  // Helper to create noise buffer
  getNoiseBuffer(ctx) {
    if (!ctx._noiseBuffer) {
      const bufferSize = ctx.sampleRate * 2; // 2 seconds of noise
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      ctx._noiseBuffer = buffer;
    }
    return ctx._noiseBuffer;
  }

  start(freq, state) {
    this.stop();
    const ctx = this.getContext();
    const now = ctx.currentTime;

    // --- LAYER 1: The "Wash" (Filtered Noise) ---
    // This provides the initial "shhh" crash sound characteristic of a tam-tam.
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    // Bandpass filter centered around the fundamental to make noise "play" the note
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = freq;
    noiseFilter.Q.value = 0.5; // Wide band

    const noiseEnv = ctx.createGain();
    noiseEnv.gain.setValueAtTime(0.5 * state.trash, now); // Controlled by "Trash" knob
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay * 0.5); // Noise dies faster

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);
    noiseEnv.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + state.decay + 0.1);

    // --- LAYER 2: The "Metallic" Ping (Pitch Swept Sine) ---
    // A gong doesn't have a steady pitch; it bends down slightly.
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 1.5, now); // Start slightly sharp (attack)
    osc.frequency.exponentialRampToValueAtTime(freq * 0.9, now + 0.5); // Bend down

    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0.7, now);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, now + state.decay);

    osc.connect(oscEnv);
    oscEnv.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + state.decay + 0.1);

    this.activeOscs = [noise, osc];
  }

  stop() {
    if (this.activeOscs) {
      this.activeOscs.forEach(o => { try { o.stop(); } catch(e) {} });
      this.activeOscs = null;
    }
  }

  createOscillator(ctx, freq, state, startTime = 0) {
    // 1. Noise Layer
    const noise = ctx.createBufferSource();
    noise.buffer = this.getNoiseBuffer(ctx);

    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = freq;
    noiseFilter.Q.value = 0.5;

    const noiseEnv = ctx.createGain();
    noiseEnv.gain.setValueAtTime(0.5 * state.trash, startTime);
    noiseEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay * 0.5);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);

    // 2. Pitch Sweep Layer
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 1.5, startTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.9, startTime + 0.5);

    const oscEnv = ctx.createGain();
    oscEnv.gain.setValueAtTime(0.7, startTime);
    oscEnv.gain.exponentialRampToValueAtTime(0.001, startTime + state.decay);

    osc.connect(oscEnv);

    // Sum them
    const sum = ctx.createGain();
    noiseEnv.connect(sum);
    oscEnv.connect(sum);

    return { oscillators: [noise, osc], outputNode: sum, hold: false };
  }
};

// 36. Sample (Audio File Import)
STYLE.sample = class extends InstrumentStyle {
  constructor() { super("Sample", "sample"); }
  
  createDefaultState() { 
    return { 
      hold: false, 
      baseNote: 'C4',
      sampleBuffer: null
    }; 
  }

  createControls(container, state, audioContext) {
    const hasSample = this.loadedBuffer ? true : false;
    const name = this.fileName || "None";

    container.innerHTML = `
      <div class="form-group">
        <label>Import Sample:</label>
        <input type="file" id="sampleFileInput" accept="audio/*" style="display:block; color:var(--modal-text);">
      </div>
      <div class="form-group">
        <label>Loaded: <span id="sampleNameDisplay" style="font-style:italic;">${name}</span></label>
      </div>
      <div class="form-group">
        <label>Base Note (Original Pitch):</label>
        <select id="ctrl_baseNote">
           ${['C1','C2','C3','C4','C5','C6'].map(n => 
             `<option value="${n}" ${state.baseNote === n ? 'selected' : ''}>${n}</option>`
           ).join('')}
        </select>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="ctrl_hold" ${state.hold ? 'checked' : ''}> Hold (Loop)</label>
      </div>
    `;

    const input = document.getElementById('sampleFileInput');
    input.addEventListener('change', (e) => this.handleFileSelect(e, audioContext));

    const noteSelect = document.getElementById('ctrl_baseNote');
    noteSelect.addEventListener('change', (e) => {
      state.baseNote = e.target.value;
    });
  }

  noteToFreq(note) {
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const octave = parseInt(note.slice(-1));
    const pitch = note.slice(0, -1);
    const noteIndex = notes.indexOf(pitch);
    const midi = (octave + 1) * 12 + noteIndex;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  async handleFileSelect(e, ctx) {
    const file = e.target.files[0];
    if (!file) return;

    this.fileName = file.name;
    const display = document.getElementById('sampleNameDisplay');
    if(display) display.innerText = file.name;

    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const arrayBuffer = ev.target.result;
        const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
        this.loadedBuffer = audioBuffer; 
      } catch (err) {
        alert("Could not decode audio file.");
      }
    };
    reader.readAsArrayBuffer(file);
  }

  saveSettings(state) {
    const chk = document.getElementById('ctrl_hold');
    const baseNoteEl = document.getElementById('ctrl_baseNote');
    if(chk) state.hold = chk.checked;
    if(baseNoteEl) state.baseNote = baseNoteEl.value;
  }

  start(targetFreq, state) {
    this.stop();
    
    if (!this.loadedBuffer) return; 

    const ctx = this.getContext();
    const source = ctx.createBufferSource();
    source.buffer = this.loadedBuffer;
    source.loop = state.hold;

    const baseFreq = this.noteToFreq(state.baseNote || 'C4');
    const playbackRate = targetFreq / baseFreq;
    source.playbackRate.value = playbackRate;

    const env = ctx.createGain();
    const now = ctx.currentTime;
    env.gain.setValueAtTime(0.5, now);

    source.connect(env);
    env.connect(this.masterGain);
    
    source.start();
    this.activeOsc = source;
    this.activeEnv = env;
  }

  stop() {
    if (this.activeOsc) {
      try {
        const ctx = this.audioContext;
        if(ctx) {
          this.activeEnv.gain.cancelScheduledValues(ctx.currentTime);
          this.activeEnv.gain.setValueAtTime(this.activeEnv.gain.value, ctx.currentTime);
          this.activeEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
          this.activeOsc.stop(ctx.currentTime + 0.06);
        }
      } catch(e) {}
      this.activeOsc = null;
    }
  }

  createOscillator(ctx, targetFreq, state) {
    if (!this.loadedBuffer) return null;

    const source = ctx.createBufferSource();
    source.buffer = this.loadedBuffer;
    source.loop = state.hold;

    const baseFreq = this.noteToFreq(state.baseNote || 'C4');
    const playbackRate = targetFreq / baseFreq;
    source.playbackRate.value = playbackRate;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0.5, ctx.currentTime);

    source.connect(env);

    return { oscillators: [source], outputNode: env, hold: state.hold };
  }
}

const styleCache = {};

function getStyle(key) {
  if (!key || !STYLE[key]) return getStyle('mute');
  if (!styleCache[key]) styleCache[key] = new STYLE[key]();
  return styleCache[key];
}

function getStyleSelectorValue(key) {
  const style = getStyle(key);
  return (typeof style.getStyleSelectorValue === 'function') 
    ? style.getStyleSelectorValue() 
    : style.value;
}

function getStyleByValue(value) {
  const key = Object.keys(STYLE).find(k => getStyle(k).value === value);
  return key ? getStyle(key) : null;
}

function populateWaveTypeSelector() {
  const select = document.getElementById('modalStyle');
  if (!select) return;
  select.innerHTML = '';
  Object.keys(STYLE).forEach(key => {
    const instance = getStyle(key);
    const option = document.createElement('option');
    option.value = instance.value;
    option.textContent = instance.name;
    select.appendChild(option);
  });
}
</script>
</head>
